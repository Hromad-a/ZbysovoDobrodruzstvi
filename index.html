<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Zbýšovo Dobrodružství</title>
<script src="rough.min.js"></script>
<style>
  @font-face{
    font-family:"Pangolin";
    src:url("Pangolin-Regular.ttf") format("truetype");
    font-display:swap;
  }
  :root{
    --ink:#3a4066; --paper:#f4ead2; --pink:#e7b7b0; --green:#8fae72;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%;overflow:hidden;background:var(--paper);
    font-family:"Pangolin","Bradley Hand","Segoe Print","Comic Sans MS","Chalkboard SE",cursive;
    color:var(--ink); touch-action:none; -webkit-user-select:none; user-select:none;}
  canvas#game{display:block;width:100vw;height:100vh}
  .overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:18px;background:var(--paper);z-index:10;padding:20px;text-align:center}
  .overlay.hidden{display:none}
  h1{font-size:clamp(28px,6vw,52px);margin:0;transform:rotate(-2deg);letter-spacing:1px}
  .sub{font-size:clamp(14px,3vw,19px);max-width:520px;line-height:1.5;transform:rotate(.5deg)}
  .chars{display:flex;gap:28px;flex-wrap:wrap;justify-content:center}
  button.char{background:#fdf6e6;border:3px solid var(--ink);cursor:pointer;padding:14px 18px 10px;
    border-radius:18px 6px 22px 8px/8px 20px 6px 18px;
    font-family:inherit;color:var(--ink);font-size:17px;transition:transform .15s}
  button.char:nth-child(1){transform:rotate(-1.5deg)}
  button.char:nth-child(2){transform:rotate(1.8deg)}
  button.char:hover,button.char:focus-visible{transform:rotate(0) scale(1.06);outline:3px dashed var(--ink);outline-offset:4px}
  button.char canvas{display:block;margin:0 auto 6px}
  .hint{font-size:13px;opacity:.75;margin-top:8px}
  #endScreen{background:rgba(244,234,210,.94)}
  #endScreen p{font-size:clamp(16px,3.5vw,22px);max-width:480px;line-height:1.6}
  button.again{background:#fdf6e6;border:3px solid var(--ink);color:var(--ink);font-family:inherit;
    font-size:18px;padding:10px 26px;cursor:pointer;transform:rotate(-1deg);
    border-radius:14px 5px 16px 7px/7px 15px 5px 14px}
  button.again:hover{transform:rotate(.5deg) scale(1.05)}
  @media (prefers-reduced-motion: reduce){ button{transition:none} }
</style>
</head>
<body>

<canvas id="game"></canvas>

<div class="overlay" id="startScreen">
  <h1>Zbýšovo Dobrodružství</h1>
  <div class="sub">Vyber, kdo dnes jde s kocourem na procházku.<br>Ten druhý se objeví na druhém konci sídliště.</div>
  <div class="chars">
    <button class="char" id="pickWoman"><canvas id="pw" width="120" height="180"></canvas>ona</button>
    <button class="char" id="pickMan"><canvas id="pm" width="120" height="180"></canvas>on</button>
  </div>
  <div class="hint">WASD / šipky &nbsp;·&nbsp; na mobilu polož prst a táhni</div>
</div>

<div class="overlay hidden" id="endScreen">
  <h1 id="endTitle">Konec procházky</h1>
  <p id="endText"></p>
  <button class="again" onclick="location.reload()">ještě jednou</button>
</div>

<script>
'use strict';
/* ============================================================
   ZBÝŠOVO DOBRODRUŽSTVÍ — sketchy placeholder prototype
   Rough.js art, boiling-line animation, Prague panelák vibes
   ============================================================ */

// ---------- constants ----------
const INK   = '#3a4066';
const PAPER = '#f4ead2';
const PAL = {
  pink:'#e7b7b0', green:'#8fae72', darkgreen:'#6f9457', road:'#9aa3b2',
  panel1:'#d9c9a8', panel2:'#c7b4c9', panel3:'#a8bfc9', panel4:'#dbb08a',
  brick:'#bd6b4f', skin:'#f0c9a0', hairW:'#d1592a', hairM:'#6b4a36',
  dressW:'#5f9ea0', coatM:'#c98f4a', cat:'#2b2b30', hedge:'#8a5a33',
  hedgeFace:'#c9a06b', leash:'#b0413e', win:'#f2e2b0', winLit:'#f0c25e',
  car1:'#7fa88f', car2:'#b7c9e0', car3:'#e0c48a'
};
const WORLD_W = 2000, WORLD_H = 1500;
const LEASH_LEN = 150;
const BOIL_MS = 280;                 // boiling-line swap period
const SS = 2;                        // sprite supersampling

// ---------- canvas / dpr ----------
const cvs = document.getElementById('game');
const ctx = cvs.getContext('2d');
let VW = 0, VH = 0, DPR = 1;
function resize(){
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  VW = window.innerWidth; VH = window.innerHeight;
  cvs.width = VW * DPR; cvs.height = VH * DPR;
  // CSS size must match innerWidth/Height exactly — 100vh overshoots the
  // visible area on mobile (URL bar), stretching the canvas so touch
  // coordinates no longer line up with what is drawn
  cvs.style.width = VW + 'px'; cvs.style.height = VH + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener('resize', resize); resize();

// ---------- rough helpers ----------
function opts(seed, fill, style, extra){
  const o = {
    seed: seed, stroke: INK, strokeWidth: 2.2, roughness: 2.0, bowing: 2,
    fillWeight: 2, hachureGap: 6, disableMultiStroke: false
  };
  if (fill){ o.fill = fill; o.fillStyle = style || 'hachure'; }
  if (extra) Object.assign(o, extra);
  return o;
}

// ---------- sprite factory (2 boil variants each) ----------
function makeSprite(w, h, drawFn){
  const out = [];
  for (let v = 0; v < 2; v++){
    const c = document.createElement('canvas');
    c.width = w * SS; c.height = h * SS;
    const g = c.getContext('2d');
    g.scale(SS, SS);
    const rc = rough.canvas(c);
    drawFn(rc, g, 100 + v * 37);       // different seed => boiling line
    out.push(c);
  }
  out.w = w; out.h = h;
  return out;
}

// ===================== SPRITES =====================
// Figures are drawn front-view, child-map style; anchor = bottom center.

function drawWoman(rc, g, s, pose){
  // pose: 'walk0' | 'walk1' | 'pet'
  const kneel = pose === 'pet';
  const oy = kneel ? 22 : 0;                    // sink down when kneeling
  // legs
  if (pose === 'walk0'){
    rc.line(28, 96, 22, 118, opts(s+1, null, null, {strokeWidth:3}));
    rc.line(36, 96, 42, 118, opts(s+2, null, null, {strokeWidth:3}));
  } else if (pose === 'walk1'){
    rc.line(30, 96, 30, 118, opts(s+1, null, null, {strokeWidth:3}));
    rc.line(34, 96, 35, 118, opts(s+2, null, null, {strokeWidth:3}));
  } else {
    rc.line(26, 112, 44, 116, opts(s+1, null, null, {strokeWidth:3})); // folded legs
  }
  // dress (long trapezoid, Modigliani-ish)
  rc.polygon([[24,52+oy],[40,52+oy],[50,100+oy*0.3],[14,100+oy*0.3]],
    opts(s+3, PAL.dressW, 'hachure', {hachureGap:5}));
  // arms
  if (kneel){
    rc.line(26, 60+oy, 4, 92, opts(s+4, null, null, {strokeWidth:3}));   // petting arm
  } else {
    rc.line(26, 58, 18, 84, opts(s+4, null, null, {strokeWidth:3}));
    rc.line(38, 58, 47, 82, opts(s+5, null, null, {strokeWidth:3}));
  }
  // long neck
  rc.line(32, 52+oy, 33, 40+oy, opts(s+6, null, null, {strokeWidth:4}));
  // elongated tilted head
  rc.ellipse(33, 26+oy, 20, 32, opts(s+7, PAL.skin, 'solid', {roughness:1.6, bowing:2.5}));
  // hair — orange arc
  rc.arc(33, 22+oy, 26, 30, Math.PI*0.95, Math.PI*2.08, true,
    opts(s+8, PAL.hairW, 'hachure', {hachureGap:3, fillWeight:2.4}));
  rc.line(22, 26+oy, 20, 46+oy, opts(s+9, null, null, {stroke:PAL.hairW, strokeWidth:4}));
  // empty Modigliani eyes + tiny mouth
  rc.line(28, 24+oy, 31, 24+oy, opts(s+10, null, null, {strokeWidth:1.6, roughness:1}));
  rc.line(36, 24+oy, 39, 24+oy, opts(s+11, null, null, {strokeWidth:1.6, roughness:1}));
  rc.line(31, 34+oy, 35, 33.4+oy, opts(s+12, null, null, {strokeWidth:1.4, roughness:1}));
}

function drawMan(rc, g, s, pose){
  const kneel = pose === 'pet';
  const oy = kneel ? 22 : 0;
  // legs (trousers)
  if (pose === 'walk0'){
    rc.line(27, 94, 20, 118, opts(s+1, null, null, {strokeWidth:4}));
    rc.line(37, 94, 44, 118, opts(s+2, null, null, {strokeWidth:4}));
  } else if (pose === 'walk1'){
    rc.line(29, 94, 28, 118, opts(s+1, null, null, {strokeWidth:4}));
    rc.line(35, 94, 37, 118, opts(s+2, null, null, {strokeWidth:4}));
  } else {
    rc.line(24, 112, 44, 115, opts(s+1, null, null, {strokeWidth:4}));
  }
  // coat — boxy
  rc.polygon([[22,50+oy],[42,50+oy],[46,96+oy*0.3],[18,96+oy*0.3]],
    opts(s+3, PAL.coatM, 'hachure', {hachureGap:5}));
  // arms
  if (kneel){
    rc.line(40, 58+oy, 60, 92, opts(s+4, null, null, {strokeWidth:3.4}));
  } else {
    rc.line(24, 56, 15, 82, opts(s+4, null, null, {strokeWidth:3.4}));
    rc.line(40, 56, 48, 80, opts(s+5, null, null, {strokeWidth:3.4}));
  }
  // neck + narrow long head
  rc.line(32, 50+oy, 32, 40+oy, opts(s+6, null, null, {strokeWidth:4.4}));
  rc.ellipse(32, 25+oy, 19, 30, opts(s+7, PAL.skin, 'solid', {roughness:1.6, bowing:2.5}));
  // brown hair blob
  rc.ellipse(32, 12+oy, 20, 12, opts(s+8, PAL.hairM, 'hachure', {hachureGap:2.6, fillWeight:2.2}));
  // face
  rc.line(27, 23+oy, 30, 23+oy, opts(s+10, null, null, {strokeWidth:1.6, roughness:1}));
  rc.line(35, 23+oy, 38, 23+oy, opts(s+11, null, null, {strokeWidth:1.6, roughness:1}));
  rc.line(30, 33+oy, 34, 33+oy, opts(s+12, null, null, {strokeWidth:1.4, roughness:1}));
}

function drawCat(rc, g, s, pose){
  const co = opts(s, PAL.cat, 'hachure', {hachureGap:2.2, fillWeight:2.6, strokeWidth:2});
  if (pose === 'lay'){
    // flat loaf, tail wrapped
    rc.ellipse(34, 34, 52, 20, co);
    rc.ellipse(56, 28, 20, 17, opts(s+1, PAL.cat, 'hachure', {hachureGap:2.2, fillWeight:2.6}));
    rc.polygon([[50,21],[53,12],[57,20]], opts(s+2, PAL.cat, 'solid'));
    rc.polygon([[60,20],[65,12],[66,21]], opts(s+3, PAL.cat, 'solid'));
    rc.curve([[12,36],[4,30],[10,22],[18,26]], opts(s+4, null, null, {stroke:PAL.cat, strokeWidth:4}));
    // closed eyes
    rc.line(52, 27, 55, 28, opts(s+5, null, null, {stroke:PAPER, strokeWidth:1.4, roughness:.8}));
    rc.line(59, 27, 62, 28, opts(s+6, null, null, {stroke:PAPER, strokeWidth:1.4, roughness:.8}));
    // postroj — strap plus back piece running onto the body
    rc.line(40, 26, 42, 42, opts(s+7, null, null, {stroke:PAL.leash, strokeWidth:2.6}));
    rc.line(31, 29, 40, 26, opts(s+8, null, null, {stroke:PAL.leash, strokeWidth:2.2}));
  } else if (pose === 'stalk0' || pose === 'stalk1'){
    // stalking — low crouch, head stretched forward, locked-on eyes
    const step = pose === 'stalk1' ? 3 : 0;
    rc.line(20, 40, 17 + step, 46, opts(s+1, null, null, {stroke:PAL.cat, strokeWidth:3}));
    rc.line(29, 40, 30 - step, 46, opts(s+2, null, null, {stroke:PAL.cat, strokeWidth:3}));
    rc.line(41, 40, 39 + step, 46, opts(s+3, null, null, {stroke:PAL.cat, strokeWidth:3}));
    rc.line(49, 40, 52 - step, 46, opts(s+4, null, null, {stroke:PAL.cat, strokeWidth:3}));
    // low stretched body
    rc.ellipse(33, 36, 46, 13, co);
    // head low, pushed forward
    rc.ellipse(56, 30, 18, 13, opts(s+5, PAL.cat, 'hachure', {hachureGap:2.2, fillWeight:2.6}));
    // ears flattened back
    rc.polygon([[47,26],[51,19],[55,25]], opts(s+6, PAL.cat, 'solid'));
    rc.polygon([[57,25],[62,19],[64,27]], opts(s+7, PAL.cat, 'solid'));
    // tail straight and low, tip twitching
    rc.curve([[13,34],[4,33],[0,30 + step]], opts(s+8, null, null, {stroke:PAL.cat, strokeWidth:4}));
    // big focused eyes with pupils
    rc.circle(52, 29, 4.4, opts(s+10, '#9fce6a', 'solid', {stroke:'#9fce6a', roughness:.6}));
    rc.circle(59, 29, 4.4, opts(s+11, '#9fce6a', 'solid', {stroke:'#9fce6a', roughness:.6}));
    rc.circle(52.6, 29, 1.7, opts(s+15, INK, 'solid', {stroke:INK, roughness:.5}));
    rc.circle(59.6, 29, 1.7, opts(s+16, INK, 'solid', {stroke:INK, roughness:.5}));
    // whiskers forward
    rc.line(62, 32, 70, 30, opts(s+12, null, null, {stroke:PAPER, strokeWidth:1, roughness:.8}));
    rc.line(62, 34, 69, 35, opts(s+13, null, null, {stroke:PAPER, strokeWidth:1, roughness:.8}));
    // postroj — red harness strap + back piece
    rc.line(44, 30, 46, 42, opts(s+14, null, null, {stroke:PAL.leash, strokeWidth:2.6}));
    rc.line(35, 32, 44, 30, opts(s+17, null, null, {stroke:PAL.leash, strokeWidth:2.2}));
  } else if (pose === 'climb'){
    // clinging to the tree — vertical, head up, legs out to the sides
    rc.curve([[24,58],[14,64],[10,70]], opts(s+1, null, null, {stroke:PAL.cat, strokeWidth:4}));
    rc.line(16, 32,  3, 28, opts(s+2, null, null, {stroke:PAL.cat, strokeWidth:3}));
    rc.line(16, 46,  4, 44, opts(s+3, null, null, {stroke:PAL.cat, strokeWidth:3}));
    rc.line(32, 32, 45, 28, opts(s+4, null, null, {stroke:PAL.cat, strokeWidth:3}));
    rc.line(32, 46, 44, 44, opts(s+5, null, null, {stroke:PAL.cat, strokeWidth:3}));
    // upright body + head on top
    rc.ellipse(24, 42, 18, 36, co);
    rc.ellipse(24, 16, 17, 14, opts(s+6, PAL.cat, 'hachure', {hachureGap:2.2, fillWeight:2.6}));
    rc.polygon([[15,10],[17,2],[22,8]], opts(s+7, PAL.cat, 'solid'));
    rc.polygon([[26,8],[31,2],[33,10]], opts(s+8, PAL.cat, 'solid'));
    rc.circle(20, 15, 3, opts(s+10, '#9fce6a', 'solid', {stroke:'#9fce6a', roughness:.6}));
    rc.circle(28, 15, 3, opts(s+11, '#9fce6a', 'solid', {stroke:'#9fce6a', roughness:.6}));
    // postroj across the chest
    rc.line(16, 30, 33, 29, opts(s+12, null, null, {stroke:PAL.leash, strokeWidth:2.6}));
    rc.line(17, 36, 32, 35, opts(s+13, null, null, {stroke:PAL.leash, strokeWidth:2.2}));
  } else {
    const step = pose === 'walk1';
    // legs
    const ly = 44;
    if (step){
      rc.line(20, 36, 15, ly, opts(s+1, null, null, {stroke:PAL.cat, strokeWidth:3}));
      rc.line(28, 36, 31, ly, opts(s+2, null, null, {stroke:PAL.cat, strokeWidth:3}));
      rc.line(42, 36, 39, ly, opts(s+3, null, null, {stroke:PAL.cat, strokeWidth:3}));
      rc.line(50, 36, 55, ly, opts(s+4, null, null, {stroke:PAL.cat, strokeWidth:3}));
    } else {
      rc.line(21, 36, 22, ly, opts(s+1, null, null, {stroke:PAL.cat, strokeWidth:3}));
      rc.line(27, 36, 26, ly, opts(s+2, null, null, {stroke:PAL.cat, strokeWidth:3}));
      rc.line(43, 36, 44, ly, opts(s+3, null, null, {stroke:PAL.cat, strokeWidth:3}));
      rc.line(49, 36, 48, ly, opts(s+4, null, null, {stroke:PAL.cat, strokeWidth:3}));
    }
    // body + head
    rc.ellipse(35, 30, 40, 17, co);
    rc.ellipse(54, 22, 18, 15, opts(s+5, PAL.cat, 'hachure', {hachureGap:2.2, fillWeight:2.6}));
    // ears
    rc.polygon([[48,16],[50,7],[55,14]], opts(s+6, PAL.cat, 'solid'));
    rc.polygon([[57,14],[62,7],[63,16]], opts(s+7, PAL.cat, 'solid'));
    // tail — proud up / curled
    if (step) rc.curve([[16,28],[8,16],[12,6]], opts(s+8, null, null, {stroke:PAL.cat, strokeWidth:4}));
    else      rc.curve([[16,28],[6,22],[6,10],[12,6]], opts(s+9, null, null, {stroke:PAL.cat, strokeWidth:4}));
    // green eyes + whiskers
    rc.circle(51, 21, 3, opts(s+10, '#9fce6a', 'solid', {stroke:'#9fce6a', roughness:.6}));
    rc.circle(58, 21, 3, opts(s+11, '#9fce6a', 'solid', {stroke:'#9fce6a', roughness:.6}));
    rc.line(60, 25, 68, 24, opts(s+12, null, null, {stroke:PAPER, strokeWidth:1, roughness:.8}));
    rc.line(60, 27, 67, 28, opts(s+13, null, null, {stroke:PAPER, strokeWidth:1, roughness:.8}));
    // postroj — red harness strap + back piece
    rc.line(44, 20, 46, 36, opts(s+14, null, null, {stroke:PAL.leash, strokeWidth:2.6}));
    rc.line(35, 23, 44, 21, opts(s+15, null, null, {stroke:PAL.leash, strokeWidth:2.2}));
  }
}

function drawHedgehog(rc, g, s, pose){
  const step = pose === 'walk1' ? 2 : 0;
  // dome (sprite is 60x48; top 8px reserved for the spikes)
  rc.polygon([[8,38],[10,22],[22,13],[36,16],[44,28],[44,38]],
    opts(s, PAL.hedge, 'hachure', {hachureGap:2.4, fillWeight:2.8, strokeWidth:2}));
  // spikes poking out of the dome
  const SPIKES = [
    [ 9,32,  1,28], [11,26,  3,19], [13,19,  6,10], [19,15, 15, 5],
    [26,13, 25, 3], [32,15, 35, 5], [38,19, 43,11], [42,25, 50,19]
  ];
  SPIKES.forEach((p, i) =>
    rc.line(p[0], p[1], p[2], p[3], opts(s+10+i, null, null, {strokeWidth:2.2, roughness:1.4})));
  // face
  rc.polygon([[44,28],[56,35],[44,39]], opts(s+1, PAL.hedgeFace, 'solid', {roughness:1.6}));
  rc.circle(56, 35, 3.4, opts(s+2, INK, 'solid', {roughness:.8}));
  rc.circle(47, 31, 2, opts(s+3, INK, 'solid', {roughness:.8}));
  // stubby legs
  rc.line(16 + step, 38, 16 + step, 45, opts(s+4, null, null, {strokeWidth:3}));
  rc.line(36 - step, 38, 36 - step, 45, opts(s+5, null, null, {strokeWidth:3}));
}

function drawFaceInWindow(rc, g, s, kind){
  // small lit window with the awaited person peeking out
  rc.rectangle(2, 2, 22, 26, opts(s, PAL.winLit, 'solid', {strokeWidth:1.8, roughness:1.4}));
  rc.ellipse(13, 18, 13, 16, opts(s+1, PAL.skin, 'solid', {roughness:1.2}));
  if (kind === 'woman'){
    rc.arc(13, 15, 16, 15, Math.PI * 0.95, Math.PI * 2.08, true,
      opts(s+2, PAL.hairW, 'hachure', {hachureGap:2.4, fillWeight:2}));
  } else {
    rc.ellipse(13, 10, 13, 7, opts(s+2, PAL.hairM, 'hachure', {hachureGap:2, fillWeight:2}));
  }
  rc.line(9, 17, 11, 17, opts(s+3, null, null, {strokeWidth:1.3, roughness:.8}));
  rc.line(15, 17, 17, 17, opts(s+4, null, null, {strokeWidth:1.3, roughness:.8}));
}

function drawTram(rc, g, s){
  // facing left (arrives from the right); anchor = bottom center
  rc.polygon([[8,70],[8,32],[18,20],[214,20],[222,32],[222,70]],
    opts(s, '#b0413e', 'hachure', {hachureGap:4, fillWeight:2.2, strokeWidth:2.4}));
  // cream skirt stripe
  rc.rectangle(12, 56, 206, 12, opts(s+1, PAL.win, 'solid', {strokeWidth:1.6, roughness:1.5}));
  // door up front + windows
  rc.rectangle(22, 32, 22, 34, opts(s+2, PAL.win, 'solid', {strokeWidth:1.8, roughness:1.6}));
  for (let i = 0; i < 5; i++){
    rc.rectangle(58 + i * 33, 30, 24, 18,
      opts(s+3+i, PAL.win, 'solid', {strokeWidth:1.6, roughness:1.6}));
  }
  // pantograph
  rc.line(120, 20, 106, 6, opts(s+8, null, null, {strokeWidth:2.2}));
  rc.line(106, 6, 138, 9, opts(s+9, null, null, {strokeWidth:2.2}));
}

function drawWormSprite(rc, g, s){
  rc.curve([[3,13],[7,6],[12,11],[17,5],[23,10]],
    opts(s, null, null, {stroke:'#d98a7f', strokeWidth:3.4, roughness:1.6}));
  rc.circle(23, 10, 2, opts(s+1, '#c9736a', 'solid', {stroke:'#c9736a', roughness:.5}));
}
function drawMound(rc, g, s){
  rc.polygon([[3,10],[8,4],[13,3],[19,5],[23,10]],
    opts(s, '#a67c52', 'hachure', {hachureGap:2.5, strokeWidth:1.6}));
}

function drawTree(rc, g, s, kind){
  if (kind === 1){
    // tall slim poplar
    rc.line(26, 112, 26, 52, opts(s, null, null, {stroke:PAL.hairM, strokeWidth:5, bowing:3}));
    rc.ellipse(26, 62, 30, 46, opts(s+1, PAL.darkgreen, 'cross-hatch', {hachureGap:5, fillWeight:1.8, bowing:3}));
    rc.ellipse(26, 32, 24, 42, opts(s+2, PAL.green, 'hachure', {hachureGap:4, fillWeight:1.8}));

const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
const dist  = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);

function inPoly(px, py, poly){
  let inside = false;
  for (let i = 0, j = poly.length - 1; i < poly.length; j = i++){
    const [xi, yi] = poly[i], [xj, yj] = poly[j];
    if ((yi > py) !== (yj > py) && px < (xj - xi) * (py - yi) / (yj - yi) + xi)
      inside = !inside;
  }
  return inside;
}

    const x = 240 + Math.random() * 630, y = 310 + Math.random() * 340;
    if (inPoly(x, y, PARK)) return { x, y };
  }
  return { x: 520, y: 500 };
}

const keys = {};
window.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; });
window.addEventListener('keyup',   e => { keys[e.key.toLowerCase()] = false; });

const joy = { active: false, ox: 0, oy: 0, dx: 0, dy: 0, id: null };
cvs.addEventListener('pointerdown', e => {
  joy.active = true; joy.id = e.pointerId;
  joy.ox = e.clientX; joy.oy = e.clientY; joy.dx = joy.dy = 0;
  cvs.setPointerCapture(e.pointerId);
});
cvs.addEventListener('pointermove', e => {
  if (!joy.active || e.pointerId !== joy.id) return;
  const dx = e.clientX - joy.ox, dy = e.clientY - joy.oy;
  const d = Math.hypot(dx, dy) || 1, m = Math.min(d, 55);
  joy.dx = (dx / d) * (m / 55); joy.dy = (dy / d) * (m / 55);
});
function joyEnd(e){ if (e.pointerId === joy.id){ joy.active = false; joy.dx = joy.dy = 0; } }
cvs.addEventListener('pointerup', joyEnd);
cvs.addEventListener('pointercancel', joyEnd);

function inputVec(){
  let x = 0, y = 0;
  if (keys['w'] || keys['arrowup'])    y -= 1;
  if (keys['s'] || keys['arrowdown'])  y += 1;
  if (keys['a'] || keys['arrowleft'])  x -= 1;
  if (keys['d'] || keys['arrowright']) x += 1;
  if (x || y){ const d = Math.hypot(x, y); return { x: x/d, y: y/d }; }
  if (joy.active) return { x: joy.dx, y: joy.dy };
  return { x: 0, y: 0 };
}

// ===================== PHYSICS =====================
function collide(ent){
  ent.x = clamp(ent.x, 20, WORLD_W - 20);
  ent.y = clamp(ent.y, 20, WORLD_H - 20);
  for (const c of colliders){
    const ex = ent.x, ey = ent.y, r = ent.r;
    if (ex > c.x - r && ex < c.x + c.w + r && ey > c.y - r && ey < c.y + c.h + r){
      const pl = ex - (c.x - r), pr = (c.x + c.w + r) - ex;
      const pt = ey - (c.y - r), pb = (c.y + c.h + r) - ey;
      const m = Math.min(pl, pr, pt, pb);
      if      (m === pl) ent.x = c.x - r;
      else if (m === pr) ent.x = c.x + c.w + r;
      else if (m === pt) ent.y = c.y - r;
      else               ent.y = c.y + c.h + r;
    }
  }
}

  const iv = (gameState === 'play') ? inputVec() : { x: 0, y: 0 };
  const speed = 175;
  player.moving = !!(iv.x || iv.y);
  if (player.moving){
    player.x += iv.x * speed * dt;
    player.y += iv.y * speed * dt;
    if (iv.x) player.flip = iv.x < 0;
    player.animT += dt;
    player.pose = (Math.floor(player.animT / 0.24) % 2) ? 'walk1' : 'walk0';
  } else if (gameState === 'play'){
    player.pose = 'walk0';
  }
  collide(player);

  // ---- arrival of the other person (tram or window mode) ----
  playT += dt;
  if (arrivalMode === 'window' && dest.state === 'away'){
    if (playT >= tram.arriveAt){
      peek.visible = false;
      dest.state = 'walking'; dest.x = 1780; dest.y = 274;   // steps out of the door
    } else if (peek.visible){
      peek.dur -= dt;
      if (peek.dur <= 0){ peek.visible = false; peek.t = 15 + Math.random() * 20; }
    } else {
      peek.t -= dt;
      if (peek.t <= 0){ peek.visible = true; peek.dur = 3.5 + Math.random() * 2; }
    }
  }
  if (arrivalMode === 'tram' && tram.state === 'away' && playT >= tram.arriveAt)
    tram.state = 'arriving';
  if (tram.state === 'arriving'){
    tram.x -= clamp((tram.x - tram.stopX) * 1.4, 40, 340) * dt;   // ease into the stop
    if (tram.x <= tram.stopX + 1){ tram.x = tram.stopX; tram.state = 'doors'; tram.t = 0; }
  } else if (tram.state === 'doors'){
    tram.t += dt;
    if (tram.t > 2.4){
      tram.state = 'leaving'; tram.vx = 30;
      dest.state = 'walking'; dest.x = tram.stopX; dest.y = 726;
    }
  } else if (tram.state === 'leaving'){
    tram.vx = Math.min(340, tram.vx + 170 * dt);
    tram.x -= tram.vx * dt;
    if (tram.x < -220) tram.state = 'gone';
  }
  if (dest.state === 'walking'){
    const tx = 1790, ty = 340;
    const d = Math.hypot(tx - dest.x, ty - dest.y);
    if (d < 4){
      dest.x = tx; dest.y = ty; dest.state = 'waiting'; dest.pose = 'walk0';
      say(dest, 'Tady jsem!', 3);
    } else {
      dest.x += (tx - dest.x) / d * 90 * dt;
      dest.y += (ty - dest.y) / d * 90 * dt;
      if (Math.abs(tx - dest.x) > 2) dest.flip = tx < dest.x;
      dest.animT += dt;
      dest.pose = (Math.floor(dest.animT / 0.24) % 2) ? 'walk1' : 'walk0';
    }
  }

  // ---- worms (park only) ----
  wormTimer -= dt;
  if (wormTimer <= 0){
    if (worms.filter(w => w.state === 'emerging' || w.state === 'out').length < 2){
      const p = randomParkPoint();
      worms.push({ x: p.x, y: p.y, state: 'emerging', t: 0 });
    }
    wormTimer = 18 + Math.random() * 20;
  }
  for (const w of worms){
    w.t += dt;
    if (w.state === 'emerging' && w.t > 0.9){ w.state = 'out'; w.t = 0; }
    else if (w.state === 'out' && w.t > 30) w.state = 'gone';
  }

  // ---- cat FSM ----
  catTalkCooldown -= dt;
  cat.stateT += dt;
  let catSpeed = 0, catTarget = null;

  if (cat.state === 'wander'){
    cat.orbitA += dt * 0.9 * (Math.sin(cat.stateT * 0.37) > 0 ? 1 : -1);
    cat.orbitR = 70 + 45 * Math.sin(cat.stateT * 0.6 + 1.3)
                    + 20 * Math.sin(cat.stateT * 1.7);
    catTarget = { x: player.x + Math.cos(cat.orbitA) * cat.orbitR,
                  y: player.y + Math.sin(cat.orbitA) * cat.orbitR * 0.8 };
    catSpeed = 110 + 60 * Math.max(0, Math.sin(cat.stateT * 0.9));
    // random sniff pause
    cat.sniffT -= dt;
    if (cat.sniffT <= 0){
      if (Math.random() < 0.25) cat.sniffT = 0.8 + Math.random() * 1.4; // pause
      else cat.sniffT = -(2 + Math.random() * 3);                        // (negative = walking window)
    }
    if (cat.sniffT > 0) catSpeed = 0;
    // spot a hedgehog
    if (catTalkCooldown <= 0){
      for (const h of hedgehogs){
        if (h.cooldown <= 0 && dist(cat, h) < 95){
          cat.state = 'approach'; cat.target = h; cat.stateT = 0;
          say(cat, '!', 1.1);
          break;
        }
      }
    }
    // the carried worm proves too tasty
    if (cat.state === 'wander' && cat.carriedWorm && cat.wormEatAt && playT >= cat.wormEatAt){
      cat.state = 'eatWorm'; cat.stateT = 0;
    }
    // spot a worm to play with (unless already carrying one)
    if (cat.state === 'wander' && !cat.carriedWorm){
      for (const w of worms){
        if (w.state === 'out' && dist(cat, w) < 110 &&
            Math.hypot(player.x - w.x, player.y - w.y) < LEASH_LEN - 10){
          cat.state = 'toWorm'; cat.wormTarget = w; cat.stateT = 0;
          say(cat, '!', 1);
          break;
        }
      }
    }
    // sudden urge to climb a nearby tree (must be within leash reach)
    cat.treeCooldown -= dt;
    if (cat.state === 'wander' && cat.treeCooldown <= 0){
      for (const t of TREES){
        if (Math.hypot(cat.x - t[0], cat.y - t[1]) < 150 &&
            Math.hypot(player.x - t[0], player.y - t[1]) < LEASH_LEN - 10){
          cat.state = 'dashTree'; cat.treeSpot = { x: t[0], y: t[1] + 4 };
          cat.stateT = 0;
          break;
        }
      }
      if (cat.state === 'wander') cat.treeCooldown = 3;  // no tree around, re-check soon
    }
  }
  else if (cat.state === 'approach'){
    // stalk the hedgehog — it keeps wandering, the cat follows it
    catTarget = cat.target; catSpeed = 130;
    if (dist(cat, cat.target) < 30){
      cat.state = 'lay'; cat.stateT = 0; cat.pose = 'lay';
      catTarget = null; catSpeed = 0;   // stop this tick or the walk pose overwrites 'lay'
      const h = cat.target;
      h.paused = true;
      if (cat.carriedWorm){
        // deliver the worm — the hedgehog is grateful and shares real info
        cat.script = [
          { at: 0.8, fn(){ say(h, dest.state !== 'away' ? WORM_INFO_ARRIVED
              : arrivalMode === 'tram' ? WORM_INFO_SOON : WORM_INFO_WINDOW, 7); } },
          { at: 6.2, fn(){ say(cat, 'Stejně se kroutila moc.', 2.2); } },
          { at: 8.6, fn(){
              if (cat.carriedWorm) cat.carriedWorm.state = 'gone';
              cat.carriedWorm = null;
              h.talked = true; h.cooldown = 30; h.paused = false;
              cat.state = 'wander'; cat.stateT = 0; catTalkCooldown = 7;
          } }
        ];
      } else {
        cat.script = [
          { at: 0.8, fn(){ say(h, h.talked ? HEDGE_ALT[Math.floor(Math.random()*HEDGE_ALT.length)] : h.line); } },
          { at: 4.6, fn(){ say(cat, CAT_LINES[Math.floor(Math.random()*CAT_LINES.length)]); } },
          { at: 7.0, fn(){
              h.talked = true; h.cooldown = 30; h.paused = false;
              cat.state = 'wander'; cat.stateT = 0; catTalkCooldown = 7;
          } }
        ];
      }
    } else if (cat.stateT > 4){ // gave up (leash too short etc.)
      cat.target.paused = false;
      cat.state = 'wander'; cat.stateT = 0; catTalkCooldown = 4;
    }
  }
  else if (cat.state === 'lay'){
    catSpeed = 0;
    if (cat.script){
      for (const step of cat.script){
        if (!step.done && cat.stateT >= step.at){ step.done = true; step.fn(); }
      }
    }
  }
  else if (cat.state === 'eatWorm'){
    catSpeed = 0;
    cat.pose = (Math.floor(cat.stateT / 0.2) % 2) ? 'stalk1' : 'stalk0';
    if (cat.stateT > 1.4){
      if (cat.carriedWorm) cat.carriedWorm.state = 'gone';
      cat.carriedWorm = null; cat.wormEatAt = null;
      cat.state = 'wander'; cat.stateT = 0;
      say(cat, EAT_LINES[Math.floor(Math.random() * EAT_LINES.length)], 2.6);
    }
  }
  else if (cat.state === 'toWorm'){
    const w = cat.wormTarget;
    if (!w || w.state !== 'out'){ cat.state = 'wander'; cat.stateT = 0; }
    else {
      catTarget = w; catSpeed = 200;
      if (dist(cat, w) < 18){ cat.state = 'playWorm'; cat.stateT = 0; }
      else if (cat.stateT > 4){ cat.state = 'wander'; cat.stateT = 0; }
    }
  }
  else if (cat.state === 'playWorm'){
    catSpeed = 0;
    const w = cat.wormTarget;
    if (!w || w.state !== 'out' || dist(cat, w) > 34){   // expired or dragged away
      cat.state = 'wander'; cat.stateT = 0; cat.wormTarget = null;
    } else {
      // bat it around a bit before taking it
      w.x += Math.sin(cat.stateT * 9) * 30 * dt;
      w.y += Math.cos(cat.stateT * 7) * 20 * dt;
      cat.flip = w.x < cat.x;
      cat.pose = (Math.floor(cat.stateT / 0.18) % 2) ? 'stalk1' : 'stalk0';
      if (cat.stateT > 3.2){
        w.state = 'carried'; cat.carriedWorm = w; cat.wormTarget = null;
        cat.state = 'wander'; cat.stateT = 0;
        // sometimes the temptation wins before he finds a hedgehog
        cat.wormEatAt = Math.random() < 0.35 ? playT + 4 + Math.random() * 6 : null;
        say(cat, 'Mám ji.', 1.4);
      }
    }
  }
  else if (cat.state === 'dashTree'){
    catTarget = cat.treeSpot; catSpeed = 240;
    if (dist(cat, cat.treeSpot) < 30){
      cat.state = 'inTree'; cat.stateT = 0; cat.pose = 'climb';
      catTarget = null; catSpeed = 0;
    } else if (cat.stateT > 3){          // leash too short after all
      cat.state = 'wander'; cat.stateT = 0; cat.treeCooldown = 10;
    }
  }
  else if (cat.state === 'inTree'){
    catSpeed = 0;
    // dragged off by the leash, or done lounging
    if (cat.stateT > 3 || dist(cat, cat.treeSpot) > 40){
      cat.state = 'wander'; cat.stateT = 0;
      cat.treeCooldown = 14 + Math.random() * 12;
      say(cat, 'Hop.', 1);
    }
  }
  else if (cat.state === 'toDest'){
    catTarget = { x: dest.x + (dest.kind === 'man' ? 34 : -30), y: dest.y + 6 };
    catSpeed = 120;
    if (dist(cat, catTarget) < 14){
      cat.state = 'petted'; cat.pose = 'lay'; cat.stateT = 0;
      catTarget = null; catSpeed = 0;
      dest.pose = 'pet';
      say(cat, 'Prrrr.', 3);
      setTimeout(showEnd, 2200);
    }
  }

  if (catTarget && catSpeed > 0){
    const d = dist(cat, catTarget);
    if (d > 6){
      const vx = (catTarget.x - cat.x) / d, vy = (catTarget.y - cat.y) / d;
      cat.x += vx * catSpeed * dt;
      cat.y += vy * catSpeed * dt;
      cat.flip = vx < 0;
      cat.animT += dt;
      const gait = cat.state === 'approach' ? 'stalk' : 'walk';
      cat.pose = gait + ((Math.floor(cat.animT / 0.22) % 2) ? '1' : '0');
    } else if (cat.state === 'wander'){
      cat.pose = 'walk0';
    }
  }
  // jump up into / down from the canopy (drawn height above the ground spot)
  const zTarget = cat.state === 'inTree' ? 58 : 0;
  cat.zOff += clamp(zTarget - cat.zOff, -260 * dt, 260 * dt);

  // leash constraint (not during ending — leash unclipped)
  if (gameState === 'play'){
    const d = dist(cat, player);
    if (d > LEASH_LEN){
      const vx = (cat.x - player.x) / d, vy = (cat.y - player.y) / d;
      cat.x = player.x + vx * LEASH_LEN;
      cat.y = player.y + vy * LEASH_LEN;
      // dragged for a while — he gives in, gets up and walks along
      cat.dragT += dt;
      if (cat.dragT > 0.6){
        if (cat.state === 'lay'){
          if (cat.target){ cat.target.paused = false; cat.target.cooldown = 10; }
          cat.script = null;
          cat.state = 'wander'; cat.stateT = 0; catTalkCooldown = 5;
          say(cat, 'No dobře, už jdu.', 1.6);
        }
        if (cat.sniffT > 0) cat.sniffT = -2;   // no sniff-sitting while towed
      }
    } else {
      cat.dragT = 0;
    }
  }
  collide(cat);

  // ---- hedgehogs ----
  for (const h of hedgehogs){
    h.cooldown -= dt;
    if (h.paused) continue;
    h.moveT -= dt;
    if (h.moveT <= 0){
      h.dir = Math.random() * Math.PI * 2;
      h.moveT = 1.5 + Math.random() * 3;
      if (Math.random() < 0.3) h.moveT = -1 - Math.random(); // pause (negative)
    }
    if (h.moveT > 0){
      h.x += Math.cos(h.dir) * 26 * dt;
      h.y += Math.sin(h.dir) * 26 * dt;
      h.flip = Math.cos(h.dir) < 0;
      h.animT += dt;
      h.pose = (Math.floor(h.animT / 0.3) % 2) ? 'walk1' : 'walk0';
      collide(h);
    }
  }

  // ---- bubbles ----
  bubbles = bubbles.filter(b => (b.t += dt) < b.dur);

  // ---- reach destination ----
  if (gameState === 'play' && dest.state === 'waiting' && dist(player, dest) < 95 &&
      (cat.state === 'wander' || cat.state === 'approach' ||
       cat.state === 'dashTree' || cat.state === 'toWorm')){
    gameState = 'ending';
    if (cat.target) cat.target.paused = false;
    cat.state = 'toDest'; cat.stateT = 0;
    player.pose = 'walk0';
  }

  // ---- camera ----
  const tx = clamp(player.x - VW / 2, 0, Math.max(0, WORLD_W - VW));
  const ty = clamp(player.y - VH / 2, 0, Math.max(0, WORLD_H - VH));
  if (!camInit){ camX = tx; camY = ty; camInit = true; }
  camX += (tx - camX) * Math.min(1, dt * 4);
  camY += (ty - camY) * Math.min(1, dt * 4);
}

function showEnd(){
  gameState = 'done';
  const who = chosen === 'woman' ? 'On' : 'Ona';
  document.getElementById('endText').innerHTML =
    who + ' se skloní a drbe kocoura za ušima. Kocour přede.<br><br>' +
    'Došli jste. Ale nejhezčí byla stejně ta cesta —<br>i s těmi ježky.';
  document.getElementById('endScreen').classList.remove('hidden');
}

// ===================== RENDER =====================
function drawSprite(spr, variant, ent, anchorH){
  const img = spr[variant];
  const w = spr.w, h = spr.h;
  ctx.save();
  ctx.translate(ent.x - camX, ent.y - camY);
  if (ent.flip) ctx.scale(-1, 1);
  ctx.drawImage(img, -w / 2, -(anchorH !== undefined ? anchorH : h), w, h);
  ctx.restore();
}

function shadow(ent, rw, rh){
  // low western sun: shadows stretch east and lengthen toward dusk,
  // then fade away once darkness takes over
  const dayT = dayPhase();
  const len = 1.2 + dayT * 2.2;
  const a = 0.12 * clamp(1 - (dayT - 0.55) / 0.3, 0, 1);
  if (a <= 0.004) return;
  ctx.save();
  ctx.globalAlpha = a;
  ctx.fillStyle = INK;
  ctx.beginPath();
  ctx.ellipse(ent.x - camX + rw * len * 0.7, ent.y - camY + 2, rw * len, rh, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function wob(n, seedShift){ // tiny deterministic wobble for hand-drawn HUD bits
  return Math.sin(n * 12.9898 + seedShift * 78.233) * 2;
}

function drawLeash(variant){
  if (gameState !== 'play') return;
  const hx = player.x - camX + (player.flip ? -10 : 10);
  const hy = player.y - camY - 44;
  const cx2 = cat.x - camX, cy2 = cat.y - camY - 14 - cat.zOff;
  const d = Math.hypot(cx2 - hx, cy2 - hy);
  const slack = Math.max(0, LEASH_LEN - d);
  const sag = Math.min(42, slack * 0.4);
  const mx = (hx + cx2) / 2 + wob(1, variant), my = (hy + cy2) / 2 + sag;
  ctx.save();
  ctx.strokeStyle = PAL.leash;
  ctx.lineWidth = 2.4;
  ctx.beginPath();
  ctx.moveTo(hx, hy);
  ctx.quadraticCurveTo(mx, my, cx2, cy2);
  ctx.stroke();
  ctx.restore();
}

function wrapText(text, maxW){
  const words = text.split(' ');
  const lines = []; let line = '';
  ctx.font = '15px "Pangolin","Bradley Hand","Segoe Print","Comic Sans MS",cursive';
  for (const w of words){
    const t = line ? line + ' ' + w : w;
    if (ctx.measureText(t).width > maxW && line){ lines.push(line); line = w; }
    else line = t;
  }
  if (line) lines.push(line);
  return lines;
}

function drawBubbles(variant){
  for (const b of bubbles){
    const e = b.ent;
    const top = e === cat ? 42 + cat.zOff : hedgehogs.includes(e) ? 42 : 116;
    const lines = wrapText(b.text, 190);
    const lw = Math.max(...lines.map(l => ctx.measureText(l).width));
    const bw = lw + 24, bh = lines.length * 19 + 16;
    let bx = e.x - camX - bw / 2, by = e.y - camY - top - bh - 14;
    bx = clamp(bx, 6, VW - bw - 6); by = clamp(by, 6, VH - bh - 6);
    ctx.save();
    // hand-wobbled rounded rect
    ctx.fillStyle = '#fdf8ea';
    ctx.strokeStyle = INK; ctx.lineWidth = 2;
    ctx.beginPath();
    const r = 10, w1 = wob(bx, variant), w2 = wob(by, variant + 1);
    ctx.moveTo(bx + r, by + w1 * 0.4);
    ctx.lineTo(bx + bw - r, by - w2 * 0.4);
    ctx.quadraticCurveTo(bx + bw, by, bx + bw + w1 * 0.3, by + r);
    ctx.lineTo(bx + bw + w2 * 0.3, by + bh - r);
    ctx.quadraticCurveTo(bx + bw, by + bh, bx + bw - r, by + bh + w1 * 0.4);
    ctx.lineTo(bx + r, by + bh - w2 * 0.4);
    ctx.quadraticCurveTo(bx, by + bh, bx - w1 * 0.3, by + bh - r);
    ctx.lineTo(bx - w2 * 0.3, by + r);
    ctx.quadraticCurveTo(bx, by, bx + r, by + w1 * 0.4);
    ctx.closePath();
    ctx.fill(); ctx.stroke();
    // tail
    ctx.beginPath();
    ctx.moveTo(clamp(e.x - camX - 6, bx + 12, bx + bw - 24), by + bh - 1);
    ctx.lineTo(e.x - camX, e.y - camY - top + 4);
    ctx.lineTo(clamp(e.x - camX + 8, bx + 16, bx + bw - 12), by + bh - 1);
    ctx.closePath();
    ctx.fillStyle = '#fdf8ea'; ctx.fill();
    ctx.strokeStyle = INK; ctx.stroke();
    // text
    ctx.fillStyle = INK;
    ctx.font = '15px "Pangolin","Bradley Hand","Segoe Print","Comic Sans MS",cursive';
    lines.forEach((l, i) => ctx.fillText(l, bx + 12, by + 22 + i * 19));
    ctx.restore();
  }
}

// ---------- day-night cycle ----------
// starts shortly before sunset, ends in near-darkness with lamps lit
const night = document.createElement('canvas');
function dayPhase(){ return clamp((40 + playT) / 340, 0, 1); }
function lampLit(i, dayT){
  const th = 0.5 + ((i * 37) % 10) * 0.02;               // staggered switch-on
  if (dayT < th) return false;
  const sinceOn = (dayT - th) * 340;                     // seconds since switch-on
  if (sinceOn < 1.1) return Math.floor(playT * 14 + i * 5) % 3 > 0;  // brief warm-up sputter
  return true;
}
function punchGlow(ng, sx, sy, r, strength){
  if (sx < -r || sx > VW + r || sy < -r || sy > VH + r) return;
  const grad = ng.createRadialGradient(sx, sy, 0, sx, sy, r);
  grad.addColorStop(0,    `rgba(0,0,0,${strength})`);
  grad.addColorStop(0.35, `rgba(0,0,0,${strength * 0.7})`);
  grad.addColorStop(0.65, `rgba(0,0,0,${strength * 0.28})`);
  grad.addColorStop(0.85, `rgba(0,0,0,${strength * 0.09})`);
  grad.addColorStop(1,    'rgba(0,0,0,0)');
  ng.fillStyle = grad;
  ng.beginPath(); ng.arc(sx, sy, r, 0, Math.PI * 2); ng.fill();
}
function drawNight(){
  const dayT = dayPhase();
  // warm sunset tint, strongest mid-dusk
  const warm = Math.sin(dayT * Math.PI) * 0.16;
  if (warm > 0.01){
    ctx.save();
    ctx.globalAlpha = warm;
    ctx.globalCompositeOperation = 'multiply';
    ctx.fillStyle = '#e8974f';
    ctx.fillRect(0, 0, VW, VH);
    ctx.restore();
  }
  const darkA = Math.pow(dayT, 1.6) * 0.62;
  if (darkA < 0.02) return;
  if (night.width !== VW || night.height !== VH){ night.width = VW; night.height = VH; }
  const ng = night.getContext('2d');
  ng.globalCompositeOperation = 'source-over';
  ng.clearRect(0, 0, VW, VH);
  ng.fillStyle = `rgba(24,26,58,${darkA})`;
  ng.fillRect(0, 0, VW, VH);
  // punch out light pools before compositing the darkness
  ng.globalCompositeOperation = 'destination-out';
  LAMPS.forEach((L, i) => {
    if (lampLit(i, dayT)) punchGlow(ng, L[0] - camX, L[1] - 46 - camY, 150, 0.9);
  });
  LITWINS.forEach(w => punchGlow(ng, w[0] - camX, w[1] - camY, 46, 0.5));
  ctx.drawImage(night, 0, 0);
  // bright lamp heads on top of the darkness
  LAMPS.forEach((L, i) => {
    if (!lampLit(i, dayT)) return;
    const sx = L[0] - camX, sy = L[1] - 48 - camY;
    if (sx < -40 || sx > VW + 40 || sy < -40 || sy > VH + 40) return;
    ctx.save();
    const halo = ctx.createRadialGradient(sx, sy, 0, sx, sy, 30);
    halo.addColorStop(0, 'rgba(255,217,138,0.5)');
    halo.addColorStop(1, 'rgba(255,217,138,0)');
    ctx.fillStyle = halo;
    ctx.beginPath(); ctx.arc(sx, sy, 30, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 0.85;
    ctx.fillStyle = '#ffd98a';
    ctx.beginPath(); ctx.arc(sx, sy, 5, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  });
}

function drawHudArrow(variant){
  if (gameState !== 'play') return;
  // before the other person arrives, the arrow tracks the incoming tram
  let tx, ty;
  if (dest.state !== 'away'){ tx = dest.x; ty = dest.y - 60; }
  else if (tram.state === 'arriving' || tram.state === 'doors'){ tx = tram.x; ty = tram.y; }
  else if (arrivalMode === 'window' && peek.visible){ tx = PEEK.x; ty = PEEK.y - 15; }
  else return;
  const sx = tx - camX, sy = ty - camY;
  if (sx > 30 && sx < VW - 30 && sy > 30 && sy < VH - 30) return; // visible
  const cx2 = VW / 2, cy2 = VH / 2;
  const a = Math.atan2(sy - cy2, sx - cx2);
  const px = clamp(cx2 + Math.cos(a) * (Math.min(VW, VH) / 2 - 46), 40, VW - 40);
  const py = clamp(cy2 + Math.sin(a) * (Math.min(VW, VH) / 2 - 46), 40, VH - 40);
  ctx.save();
  ctx.translate(px, py); ctx.rotate(a);
  ctx.strokeStyle = INK; ctx.fillStyle = '#fdf8ea'; ctx.lineWidth = 2.4;
  const j = wob(3, variant);
  ctx.beginPath();
  ctx.moveTo(16 + j * 0.4, 0); ctx.lineTo(-10, -11 + j * 0.3);
  ctx.lineTo(-4, 0); ctx.lineTo(-10 - j * 0.3, 11);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  ctx.restore();
}

function drawJoystick(){
  if (!joy.active) return;
  ctx.save();
  ctx.globalAlpha = 0.4;
  ctx.strokeStyle = INK; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.arc(joy.ox, joy.oy, 52, 0, Math.PI * 2); ctx.stroke();
  ctx.globalAlpha = 0.55;
  ctx.fillStyle = INK;
  ctx.beginPath();
  ctx.arc(joy.ox + joy.dx * 42, joy.oy + joy.dy * 42, 17, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function render(now){
  const variant = Math.floor(now / BOIL_MS) % 2;
  ctx.fillStyle = PAPER;
  ctx.fillRect(0, 0, VW, VH);
  if (gameState === 'start') return;

  // world
  ctx.drawImage(worldLayers[variant],
    camX, camY, VW, VH, 0, 0, VW, VH);

  // shadows
  shadow(player, 16, 5); shadow(cat, 18, 5);
  if (dest.state !== 'away') shadow(dest, 16, 5);
  if (tram.state === 'arriving' || tram.state === 'doors' || tram.state === 'leaving')
    shadow({ x: tram.x, y: tram.y + 34 }, 95, 8);
  hedgehogs.forEach(h => shadow(h, 14, 4));
  TREES.forEach(t => {
    const e = { x: t[0], y: t[1] };
    shadow(e, 20, 6);
  });

  drawLeash(variant);

  // y-sorted entities
  const ents = [];
  ents.push({ y: player.y, draw: () => drawSprite(SPR[player.kind][player.pose], variant, player) });
  if (dest.state !== 'away')
    ents.push({ y: dest.y, draw: () => drawSprite(SPR[dest.kind][dest.pose], variant, dest) });
  if (tram.state === 'arriving' || tram.state === 'doors' || tram.state === 'leaving')
    ents.push({ y: tram.y + 38, draw: () => drawSprite(SPR.tram.idle, variant,
      { x: tram.x, y: tram.y + 38, flip: false }) });
  worms.forEach(w => {
    if (w.state !== 'emerging' && w.state !== 'out') return;
    ents.push({ y: w.y, draw: () => {
      drawSprite(SPR.mound.idle, variant, { x: w.x, y: w.y + 2, flip: false });
      if (w.state === 'out')
        drawSprite(SPR.worm.idle, variant, { x: w.x, y: w.y - 2, flip: false });
    } });
  });
  // while in a tree, sort just below the tree's anchor so he draws over its canopy
  ents.push({ y: (cat.state === 'inTree' && cat.treeSpot) ? cat.treeSpot.y + 12 : cat.y,
              draw: () => {
    drawSprite(SPR.cat[cat.pose], variant, { x: cat.x, y: cat.y - cat.zOff, flip: cat.flip });
    if (cat.carriedWorm)
      drawSprite(SPR.worm.idle, variant,
        { x: cat.x + (cat.flip ? -26 : 26), y: cat.y - 10 - cat.zOff, flip: cat.flip });
  } });
  hedgehogs.forEach(h => ents.push({ y: h.y, draw: () => drawSprite(SPR.hedge[h.pose], variant, h) }));
  TREES.forEach((t, i) => ents.push({ y: t[1], draw: () => drawSprite(SPR.tree['v' + (i % 3)], variant, { x: t[0], y: t[1], flip: false }) }));
  ents.sort((a, b) => a.y - b.y);
  ents.forEach(e => e.draw());

  // the awaited person peeking from their window (window arrival mode)
  if (arrivalMode === 'window' && peek.visible && dest.kind)
    drawSprite(SPR.face[dest.kind], variant, { x: PEEK.x, y: PEEK.y, flip: false });

  drawNight();
  drawBubbles(variant);
  drawHudArrow(variant);
  drawJoystick();

  // paper grain
  if (!grainPattern) grainPattern = ctx.createPattern(grain, 'repeat');
  ctx.save();
  ctx.globalAlpha = 0.06;
  ctx.globalCompositeOperation = 'multiply';
  ctx.fillStyle = grainPattern;
  ctx.fillRect(0, 0, VW, VH);
  ctx.restore();
}

// ===================== LOOP =====================
let last = performance.now();
function loop(now){
  const dt = Math.min(0.05, (now - last) / 1000);
  last = now;
  update(dt);
  render(now);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ===================== START SCREEN =====================
function paintPortrait(id, kind){
  const c = document.getElementById(id);
  const g = c.getContext('2d');
  g.fillStyle = '#fdf6e6'; g.fillRect(0, 0, c.width, c.height);
  const img = SPR[kind].walk0[0];
  g.drawImage(img, 60 - SPR[kind].walk0.w * 0.7, 172 - SPR[kind].walk0.h * 1.4,
    SPR[kind].walk0.w * 1.4, SPR[kind].walk0.h * 1.4);
}
paintPortrait('pw', 'woman');
paintPortrait('pm', 'man');

function pick(kind){
  chosen = kind;
  player.kind = kind;
  dest.kind = kind === 'woman' ? 'man' : 'woman';
  document.getElementById('startScreen').classList.add('hidden');
  gameState = 'play';
  say(cat, 'Mňau. Tak jdem.', 2.4);
}
document.getElementById('pickWoman').addEventListener('click', () => pick('woman'));
document.getElementById('pickMan').addEventListener('click', () => pick('man'));
</script>
