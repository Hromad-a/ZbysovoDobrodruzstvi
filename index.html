// ===================== PHYSICS =====================
function collide(ent){
  ent.x = clamp(ent.x, 20, WORLD_W - 20);
  ent.y = clamp(ent.y, 20, WORLD_H - 20);
  for (const c of colliders){
    const ex = ent.x, ey = ent.y, r = ent.r;
    if (ex > c.x - r && ex < c.x + c.w + r && ey > c.y - r && ey < c.y + c.h + r){
      const pl = ex - (c.x - r), pr = (c.x + c.w + r) - ex;
      const pt = ey - (c.y - r), pb = (c.y + c.h + r) - ey;
      const m = Math.min(pl, pr, pt, pb);
      if      (m === pl) ent.x = c.x - r;
      else if (m === pr) ent.x = c.x + c.w + r;
      else if (m === pt) ent.y = c.y - r;
      else               ent.y = c.y + c.h + r;
    }
  }
}

// ===================== UPDATE =====================
function update(dt){
  if (gameState !== 'play' && gameState !== 'ending') return;

  // ---- player ----
  const iv = (gameState === 'play') ? inputVec() : { x: 0, y: 0 };
  const speed = 175;
  player.moving = !!(iv.x || iv.y);
  if (player.moving){
    player.x += iv.x * speed * dt;
    player.y += iv.y * speed * dt;
    if (iv.x) player.flip = iv.x < 0;
    // track how long we've held roughly one direction (for the cat to heel)
    const mAng = Math.atan2(iv.y, iv.x);
    let mda = mAng - player.moveAng;
    while (mda > Math.PI) mda -= 6.2832; while (mda < -Math.PI) mda += 6.2832;
    player.moveStreak = Math.abs(mda) < 0.7 ? player.moveStreak + dt : 0;
    player.moveAng = mAng;
    player.animT += dt;
    const beat = Math.floor(player.animT / 0.24);
    player.pose = (beat % 2) ? 'walk1' : 'walk0';
    if (beat !== player.stepBeat){ player.stepBeat = beat; if (beat % 2 === 0) playStep(); }
    player.idleT = 0; player.special = null;
  } else if (gameState === 'play'){
    // idle quirks: sit on a nearby bench, else the boy checks his phone /
    // the girl crouches to pet the cat
    player.moveStreak = 0;
    player.idleT += dt;
    const bench = player.holding ? null : benchNear(player);
    if (player.holding){
      /* holding the cat — no other idle actions */
    } else if (player.special === 'sit'){
      if (!bench) player.special = null;               // (shouldn't happen while seated)
      // occasionally shift the lean to the side while sitting
      else if ((player.sitLeanT -= dt) <= 0){
        player.sitTilt = Math.random() < 0.45 ? 0 : (Math.random() < 0.5 ? -1 : 1) * (0.05 + Math.random() * 0.11);
        player.sitLeanT = 2.5 + Math.random() * 3.5;
      }
    } else if (bench && player.idleT > 1){
      player.special = 'sit';                          // settle onto the seat after ~1s
      player.x = bench[0] + 30; player.y = bench[1] + 34;
      player.sitTilt = Math.random() < 0.45 ? 0 : (Math.random() < 0.5 ? -1 : 1) * (0.05 + Math.random() * 0.11);
      player.sitLeanT = 2.5 + Math.random() * 3.5;
    } else if (player.special){
      player.specialT -= dt;
      if (player.specialT <= 0){ player.special = null; player.idleT = 0; }
    } else if (player.idleT > 2 && Math.random() < dt * 0.8){
      if (chosen === 'man'){
        player.special = 'phone'; player.specialT = 3 + Math.random() * 3;
      } else if (dist(player, cat) < 95){
        player.special = 'pet'; player.specialT = 3 + Math.random() * 2;
      }
    }
    player.pose = player.holding ? 'hold' : (player.special || 'walk0');
  }
  if (player.holding) player.pose = 'hold';           // holds the pose even while walking
  // ease the seated side-lean in/out (0 when not sitting)
  const rotTarget = (player.special === 'sit') ? player.sitTilt : 0;
  player.rot += (rotTarget - player.rot) * Math.min(1, dt * 5);
  collide(player);

  // ---- arrival of the other person (tram or window mode) ----
  playT += dt;
  if (arrivalMode === 'window' && dest.state === 'away'){
    if (playT >= tram.arriveAt){
      peek.visible = false;
      dest.state = 'walking'; dest.x = 1780; dest.y = 274;   // steps out of the door
    } else if (peek.visible){
      peek.dur -= dt;
      if (peek.dur <= 0){ peek.visible = false; peek.t = 15 + Math.random() * 20; }
    } else {
      peek.t -= dt;
      if (peek.t <= 0){ peek.visible = true; peek.dur = 3.5 + Math.random() * 2; }
    }
  }
  if (arrivalMode === 'tram' && tram.state === 'away' && playT >= tram.arriveAt){
    tram.state = 'arriving'; playTram();
  }
  if (tram.state === 'arriving'){
    tram.x -= clamp((tram.x - tram.stopX) * 1.4, 40, 340) * dt;   // ease into the stop
    if (tram.x <= tram.stopX + 1){ tram.x = tram.stopX; tram.state = 'doors'; tram.t = 0; }
  } else if (tram.state === 'doors'){
    tram.t += dt;
    if (tram.t > 2.4){
      tram.state = 'leaving'; tram.vx = 30; playTram();   // rings off as it departs
      dest.state = 'walking'; dest.x = tram.stopX; dest.y = 726;
    }
  } else if (tram.state === 'leaving'){
    tram.vx = Math.min(340, tram.vx + 170 * dt);
    tram.x -= tram.vx * dt;
    if (tram.x < -220) tram.state = 'gone';
  }
  if (dest.state === 'walking'){
    const tx = dest.tx, ty = dest.ty;
    const d = Math.hypot(tx - dest.x, ty - dest.y);
    if (d < 4){
      dest.x = tx; dest.y = ty; dest.state = 'waiting'; dest.pose = 'walk0';
      say(dest, T.dest.arrive, 3);
    } else {
      dest.x += (tx - dest.x) / d * 90 * dt;
      dest.y += (ty - dest.y) / d * 90 * dt;
      if (Math.abs(tx - dest.x) > 2) dest.flip = tx < dest.x;
      dest.animT += dt;
      dest.pose = (Math.floor(dest.animT / 0.24) % 2) ? 'walk1' : 'walk0';
    }
  }

  // ---- worms (park only) ----
  wormTimer -= dt;
  if (wormTimer <= 0){
    if (worms.filter(w => w.state === 'emerging' || w.state === 'out').length < 2){
      const p = randomParkPoint();
      worms.push({ x: p.x, y: p.y, state: 'emerging', t: 0 });
    }
    wormTimer = 18 + Math.random() * 20;
  }
  for (const w of worms){
    w.t += dt;
    if (w.state === 'emerging' && w.t > 0.9){ w.state = 'out'; w.t = 0; }
    else if (w.state === 'out' && w.t > 30) w.state = 'gone';
  }

  // ---- hares: dart around, flee from the cat/player, despawn after a while ----
  hareTimer -= dt;
  if (hareTimer <= 0){
    if (hares.length < 2) spawnHare();
    hareTimer = 24 + Math.random() * 34;
  }
  for (let i = hares.length - 1; i >= 0; i--){
    const h = hares[i]; h.t += dt;
    // once its time is up the hare leaves for good — never just vanish in view:
    // if it's already off-screen remove it, otherwise flag it to bolt off the
    // nearest edge of the view and only despawn once it's actually out of sight
    if (!h.leaving && h.t > h.life){
      const onScreen = h.x > camX - 30 && h.x < camX + VW + 30 && h.y > camY - 30 && h.y < camY + VH + 30;
      if (!onScreen){ hares.splice(i, 1); continue; }
      h.leaving = true;
    }
    if (h.leaving){
      // run straight off the closest edge of the view, ignoring threats/wander
      const dl = h.x - camX, dr = camX + VW - h.x, dtp = h.y - camY, db = camY + VH - h.y;
      const m = Math.min(dl, dr, dtp, db);
      h.dir = m === dl ? Math.PI : m === dr ? 0 : m === dtp ? -Math.PI / 2 : Math.PI / 2;
      h.speed = 260;
    } else {
      const threat = dist(h, cat) < dist(h, player) ? cat : player;
      if (dist(h, threat) < 210){                     // bolt straight away
        h.dir = Math.atan2(h.y - threat.y, h.x - threat.x);
        h.speed = 245;
      } else {
        h.moveT -= dt;
        if (h.moveT <= 0){ h.dir += (Math.random() - 0.5) * 2.2; h.moveT = 0.4 + Math.random() * 1.1; }
        h.speed = 150;
      }
    }
    h.x += Math.cos(h.dir) * h.speed * dt;
    h.y += Math.sin(h.dir) * h.speed * dt;
    const hx = Math.cos(h.dir);
    if (Math.abs(hx) > 0.2) h.flip = hx < 0;   // keep facing when near-vertical, avoids flip jitter
    h.animT += dt;
    h.pose = (Math.floor(h.animT / 0.11) % 2) ? 'walk1' : 'walk0';   // fast legs
    if (!h.leaving){
      collide(h);
      if (h.x <= 20 || h.x >= WORLD_W - 20 || h.y <= 20 || h.y >= WORLD_H - 20) h.dir += Math.PI;
    } else if (h.x < camX - 60 || h.x > camX + VW + 60 || h.y < camY - 60 || h.y > camY + VH + 60){
      hares.splice(i, 1);                       // fully off-screen now — gone
    }
  }
  // ---- pigeons: peck about; a startled one bolts skyward WITH the cat ----
  pigeonTimer -= dt;
  if (pigeonTimer <= 0){
    if (pigeons.length < 3) spawnPigeon();
    pigeonTimer = 14 + Math.random() * 20;
  }
  for (let i = pigeons.length - 1; i >= 0; i--){
    const pg = pigeons[i]; pg.t += dt;
    if (pg.shyT > 0) pg.shyT -= dt;
    if (pg.state === 'ground'){
      // the player stomping too close scares it off (the CAT triggers the ride)
      if (pg.t > pg.life || dist(pg, player) < 42){
        pg.state = 'flyaway';
        pg.dir = Math.atan2(pg.y - player.y, pg.x - player.x);
      } else {
        pg.cooT -= dt;
        if (pg.cooT <= 0){
          if (dist(pg, player) < 220 && !bubbles.some(b => b.ent === pg)) say(pg, T.pigeon.coo, 1.1);
          pg.cooT = 7 + Math.random() * 9;
        }
        pg.moveT -= dt;
        if (pg.moveT <= 0){
          pg.dir = Math.random() * 6.28;
          pg.moveT = 0.8 + Math.random() * 1.6;
          if (Math.random() < 0.45) pg.moveT = -(0.7 + Math.random() * 1.4);   // pause & peck
        }
        if (pg.moveT > 0){
          pg.x += Math.cos(pg.dir) * 24 * dt;
          pg.y += Math.sin(pg.dir) * 24 * dt;
          pg.flip = Math.cos(pg.dir) < 0;
          pg.animT += dt;
          pg.pose = (Math.floor(pg.animT / 0.22) % 2) ? 'walk1' : 'walk0';
          collide(pg);
        } else {
          pg.animT += dt;
          pg.pose = (Math.floor(pg.animT / 0.34) % 2) ? 'walk1' : 'walk0';     // peck bob
        }
      }
    } else if (pg.state === 'carry'){
      // hauling the cat: beeline for the landing spot, cat dangling below
      const lt = pg.landTarget;
      const dd = Math.hypot(lt.x - pg.x, lt.y - pg.y) || 1;
      pg.zOff = cat.zOff + 30;
      pg.x += (lt.x - pg.x) / dd * 175 * dt;
      pg.y += (lt.y - pg.y) / dd * 175 * dt;
      pg.flip = (lt.x - pg.x) < 0;
      pg.animT += dt;
      pg.pose = (Math.floor(pg.animT / 0.1) % 2) ? 'fly1' : 'fly0';
      if (dd < 10){                                  // drops him and clears off
        pg.state = 'flyaway'; pg.dir = Math.random() * 6.28;
        if (cat.state === 'pigeonRide'){ cat.state = 'pigeonDrop'; cat.stateT = 0; }
      }
    } else {                                         // flyaway — up, up and gone
      pg.zOff += 95 * dt;
      pg.x += Math.cos(pg.dir) * 130 * dt;
      pg.y += Math.sin(pg.dir) * 130 * dt;
      pg.flip = Math.cos(pg.dir) < 0;
      pg.animT += dt;
      pg.pose = (Math.floor(pg.animT / 0.1) % 2) ? 'fly1' : 'fly0';
      if (pg.zOff > 135) pigeons.splice(i, 1);
    }
  }

  // ---- bugs: flies/mosquitoes/moths that hang around a spot for a while ----
  bugTimer -= dt;
  if (bugTimer <= 0){
    if (gameState === 'play' && bugs.length < 2) spawnBug();
    bugTimer = 16 + Math.random() * 22;
  }
  for (let i = bugs.length - 1; i >= 0; i--){
    const b = bugs[i]; b.t += dt;
    if (b.t > b.life){
      b.fade -= dt * 1.6;                            // dissolves into thin air
      if (b.fade <= 0){ bugAudioStop(b); bugs.splice(i, 1); continue; }
    }
    b.moveT -= dt;
    if (b.moveT <= 0){
      // erratic darting, drawn back toward its anchor spot
      const home = Math.atan2(b.anchor.y - b.y, b.anchor.x - b.x);
      const far = dist(b, b.anchor) > 90;
      b.dir = far ? home + (Math.random() - 0.5) * 0.8 : Math.random() * 6.28;
      b.moveT = 0.12 + Math.random() * 0.3;
    }
    if (cat.state === 'chaseBug' && cat.bugTarget === b && dist(b, cat) < 70)
      b.dir = Math.atan2(b.y - cat.y, b.x - cat.x) + (Math.random() - 0.5) * 0.9;  // dodge the paws
    const bsp = b.type === 'fly' ? 150 : b.type === 'mosquito' ? 115 : 85;
    b.x += Math.cos(b.dir) * bsp * dt;
    b.y += Math.sin(b.dir) * bsp * dt;
    b.x = clamp(b.x, 30, WORLD_W - 30); b.y = clamp(b.y, 30, WORLD_H - 30);
    b.zOff = (b.type === 'moth' ? 38 : 16) + Math.sin(b.t * 5.3) * 8;
    if (Math.abs(Math.cos(b.dir)) > 0.25) b.flip = Math.cos(b.dir) < 0;
    b.animT += dt;
    const flap = b.type === 'moth' ? 0.11 : 0.05;
    b.pose = (Math.floor(b.animT / flap) % 2) ? 'w1' : 'w0';
  }

  // flung dirt specks (from the cat burying)
  for (let i = dirt.length - 1; i >= 0; i--){
    const d = dirt[i]; d.t += dt; d.vy += 320 * dt;
    d.x += d.vx * dt; d.y += d.vy * dt;
    if (d.t > 0.6) dirt.splice(i, 1);
  }

  // ---- ambient traffic (rare) ----
  carTimer -= dt;
  if (carTimer <= 0){
    if (movingCars.length < 2){
      const eastbound = Math.random() < 0.5;
      const sp = 130 + Math.random() * 90;
      movingCars.push({ x: eastbound ? -140 : WORLD_W + 140,
        y: eastbound ? 748 : 790, vx: eastbound ? sp : -sp,
        spr: ['a', 'b', 'c'][Math.floor(Math.random() * 3)] });
    }
    carTimer = 22 + Math.random() * 55;    // very rarely
  }
  for (let i = movingCars.length - 1; i >= 0; i--){
    movingCars[i].x += movingCars[i].vx * dt;
    if (movingCars[i].x < -180 || movingCars[i].x > WORLD_W + 180){
      carAudioStop(movingCars[i]); movingCars.splice(i, 1);
    }
  }

  // ---- other people & their dogs ----
  for (const p of peds){
    // passerby coming over to comment on the cat-on-a-leash
    if (p.commentState === 'approach'){
      const d = dist(p, player) || 1;
      if (d > 80){
        p.x += (player.x - p.x) / d * p.speed * 1.35 * dt;
        p.y += (player.y - p.y) / d * p.speed * 1.35 * dt;
        p.flip = (player.x - p.x) < 0; p.animT += dt;
        p.pose = (Math.floor(p.animT / 0.24) % 2) ? 'walk1' : 'walk0';
        collide(p);
        if ((p.commentT += dt) > 9) p.commentState = null;   // gave up (blocked)
      } else {
        p.commentState = 'talk'; p.commentT = 0; p.pose = 'walk0';
        p.flip = (player.x - p.x) < 0;
        say(p, PASSERBY[Math.floor(Math.random() * PASSERBY.length)], 5.5);
      }
      continue;
    }
    if (p.commentState === 'talk'){
      p.pose = 'walk0';
      if ((p.commentT += dt) > 5) p.commentState = null;      // done, back to wandering
      continue;
    }

    const dg = p.dog;
    const dogNearCat = dg && gameState !== 'done' && dist(dg, cat) < 150;
    // the owner notices the fuss and, after a moment, hauls the dog off
    if (dogNearCat) p.pullT += dt; else p.pullT = Math.max(0, p.pullT - dt * 0.6);
    const pulling = p.pullT > 2.2 && dg && dist(dg, cat) < 240;

    p.moveT -= dt;
    if (p.moveT <= 0){
      p.dir = Math.random() * Math.PI * 2;
      p.moveT = 2 + Math.random() * 4;
      if (Math.random() < 0.2) p.moveT = -(1 + Math.random() * 2);  // pause
    }
    if (pulling){                                 // stride away from the cat, tugging the dog
      const ax = p.x - cat.x, ay = p.y - cat.y, al = Math.hypot(ax, ay) || 1;
      p.x += ax / al * p.speed * 1.5 * dt; p.y += ay / al * p.speed * 1.5 * dt;
      p.flip = ax < 0; p.animT += dt;
      p.pose = (Math.floor(p.animT / 0.2) % 2) ? 'walk1' : 'walk0';
      collide(p);
    } else if (p.moveT > 0){
      p.x += Math.cos(p.dir) * p.speed * dt;
      p.y += Math.sin(p.dir) * p.speed * dt;
      p.flip = Math.cos(p.dir) < 0;
      p.animT += dt;
      p.pose = (Math.floor(p.animT / 0.24) % 2) ? 'walk1' : 'walk0';
      collide(p);
      if (p.x <= 24 || p.x >= WORLD_W - 24 || p.y <= 24 || p.y >= WORLD_H - 24)
        p.dir += Math.PI;                         // turn back at the edges
    } else p.pose = 'walk0';

    if (dg){
      // barking at the cat when close (unless being hauled off)
      if (dogNearCat && !pulling){
        dg.flip = (cat.x - dg.x) < 0;
        dg.barkT -= dt;
        if (dg.barkT <= 0 && gameState === 'play'){
          say(dg, T.dog.bark, 0.8); playBark(); dg.barkT = 0.7 + Math.random() * 0.7;
        }
      }
      let dtx, dty;
      if (pulling){ dtx = p.x + (p.flip ? 22 : -22); dty = p.y + 12; }   // heeled to the owner
      else if (dogNearCat){ dtx = cat.x; dty = cat.y; }                  // lunge toward the cat
      else if (dg.leashed){ dtx = p.x + (p.flip ? 24 : -24); dty = p.y + 14; }
      else {
        dg.moveT -= dt;
        if (dg.moveT <= 0){ dg.wx = p.x + (Math.random()*200-100); dg.wy = p.y + (Math.random()*200-100); dg.moveT = 1.5 + Math.random()*2.5; }
        dtx = dg.wx; dty = dg.wy;
      }
      const dd = Math.hypot(dtx - dg.x, dty - dg.y) || 1;
      if (dd > 14){
        const dsp = pulling ? 92 : dogNearCat ? 88 : (dg.leashed ? 75 : 58);
        dg.x += (dtx - dg.x) / dd * dsp * dt;
        dg.y += (dty - dg.y) / dd * dsp * dt;
        dg.flip = (dtx - dg.x) < 0;
        dg.animT += dt;
        dg.pose = (Math.floor(dg.animT / 0.2) % 2) ? 'walk1' : 'walk0';
        collide(dg);
      } else dg.pose = 'walk0';
      // a leashed dog can't stray far from the owner, even while straining
      if (dg.leashed){
        const od = Math.hypot(dg.x - p.x, dg.y - p.y), maxLead = pulling ? 30 : 54;
        if (od > maxLead){ dg.x = p.x + (dg.x - p.x) / od * maxLead; dg.y = p.y + (dg.y - p.y) / od * maxLead; }
      }
    }
  }

  // ---- window dwellers (people & cats appearing at windows) ----
  winTimer -= dt;
  if (winTimer <= 0){
    if (ALLWINS.length && winFolks.length < 4){
      const w = ALLWINS[Math.floor(Math.random() * ALLWINS.length)];
      if (!winFolks.some(f => f.x === w[0] && f.y === w[1])){
        const r = Math.random();
        const type = r < 0.4 ? 'cat' : r < 0.7 ? 'woman' : 'man';
        const spr = type === 'cat'
          ? SPR.wincat[Math.floor(Math.random() * SPR.wincat.length)]   // random cat colour
          : SPR.face[type];
        winFolks.push({ x: w[0], y: w[1], type, spr, flip: Math.random() < 0.5,
                        t: 0, dur: 5 + Math.random() * 10 });
      }
    }
    winTimer = 3 + Math.random() * 6;
  }
  for (let i = winFolks.length - 1; i >= 0; i--){
    if ((winFolks[i].t += dt) > winFolks[i].dur) winFolks.splice(i, 1);
  }

  // ---- weather ----
  weatherTimer -= dt;
  if (weatherTimer <= 0){
    if (Math.random() < 0.5) weatherLevel = clamp(weatherLevel + (Math.random() < 0.5 ? -1 : 1), 0, 3);
    weatherTimer = 25 + Math.random() * 35;
  }
  const nowRainy = weatherLevel >= 2;
  if (nowRainy && !prevRainy){
    rainCap = 35 + Math.random() * 25;                  // this shower lasts ~35–60s
    // the cat grumbles the moment real rain starts
    if (gameState === 'play' && !bubbles.some(b => b.ent === cat))
      say(cat, CAT_RAIN_LINES[Math.floor(Math.random() * CAT_RAIN_LINES.length)], 2.8);
  }
  prevRainy = nowRainy;
  // don't let real rain drag on much past a minute — ease it off to a drizzle
  if (nowRainy){
    rainElapsed += dt;
    if (rainElapsed > rainCap){ weatherLevel = 1; rainElapsed = 0; weatherTimer = 45 + Math.random() * 55; }
  } else rainElapsed = 0;
  // puddles grow while it rains, dry out otherwise
  for (const pd of puddles){
    const tgt = nowRainy ? pd.max * (weatherLevel === 3 ? 1 : 0.7) : 0;
    pd.size += (tgt - pd.size) * Math.min(1, dt * (nowRainy ? 0.18 : 0.32));
  }
  const wantRain = [0, 40, 95, 170][weatherLevel];
  while (RAIN.length < wantRain)
    RAIN.push({ x: Math.random() * (VW + 240) - 120, y: Math.random() * VH,
                sp: 620 + Math.random() * 380 + weatherLevel * 90,
                len: 6 + Math.random() * (5 + weatherLevel * 3),
                w: 2.4 + Math.random() * 2.2, wind: -30 - weatherLevel * 35 });
  if (RAIN.length > wantRain) RAIN.length = wantRain;
  for (const d of RAIN){
    d.y += d.sp * dt; d.x += d.wind * dt;
    if (d.y > VH + 10){ d.y = -10; d.x = Math.random() * (VW + 240) - 120; }
  }
  if (weatherLevel >= 3){                        // lightning in a storm
    lightningCooldown -= dt;
    if (lightningCooldown <= 0){
      flash = 1; lightningCooldown = 5 + Math.random() * 13;
      const pts = []; let bx = 100 + Math.random() * Math.max(1, VW - 200), by = 0;
      pts.push([bx, by]);
      while (by < VH * 0.55){ by += 22 + Math.random() * 30; bx += (Math.random() - 0.5) * 60; pts.push([bx, by]); }
      boltPts = pts;
      // a branching fork off a mid point
      const fi = Math.floor(pts.length * (0.4 + Math.random() * 0.3));
      let fx = pts[fi][0], fy = pts[fi][1]; const fork = [[fx, fy]];
      const steps = 2 + Math.floor(Math.random() * 3);
      for (let k = 0; k < steps; k++){
        fy += 18 + Math.random() * 26; fx += (Math.random() < 0.5 ? -1 : 1) * (22 + Math.random() * 40);
        fork.push([fx, fy]);
      }
      boltFork = fork;
      setTimeout(playThunder, 150 + Math.random() * 500);   // thunder trails the flash
    }
  }
  if (flash > 0) flash = Math.max(0, flash - dt * 2.8);

  // ---- rowdy street noise + the cat's grumbly reaction ----
  shoutTimer -= dt;
  if (shoutTimer <= 0){
    if (gameState === 'play'){
      playShout();
      if (!bubbles.some(b => b.ent === cat)){
        say(cat, CAT_STREET_LINES[Math.floor(Math.random() * CAT_STREET_LINES.length)], 3.2);
        setTimeout(playMumble, 700);              // annoyed mumble after the complaint
        catChatCooldown = Math.max(catChatCooldown, 12);
      }
    }
    shoutTimer = 45 + Math.random() * 75;
  }

  // ---- a passerby wanders over to marvel at the cat on a leash ----
  commenterTimer -= dt;
  if (commenterTimer <= 0){
    if (gameState === 'play' && !peds.some(p => p.commentState)){
      const cand = peds.filter(p => !p.dog && !p.commentState && dist(p, player) < 520);
      if (cand.length){
        const p = cand[Math.floor(Math.random() * cand.length)];
        p.commentState = 'approach'; p.commentT = 0;
      }
    }
    commenterTimer = 30 + Math.random() * 45;
  }

  // ---- the person scoops the cat up and holds him a while ----
  holdTimer -= dt;
  if (holdTimer <= 0){
    if (gameState === 'play' && !player.holding && cat.state === 'wander' &&
        dist(cat, player) < 80 && player.special !== 'sit'){
      cat.state = 'held'; cat.stateT = 0; cat.holdDur = 5 + Math.random() * 4;
      cat.squirmRot = 0; cat._squirmed = false; player.holding = true; playMeow();
    }
    holdTimer = 35 + Math.random() * 45;
  }

  // ---- cat FSM ----
  catTalkCooldown -= dt;
  cat.stateT += dt;
  let catSpeed = 0, catTarget = null;

  // a nearby dog frightens the cat, interrupting most activities (but not while held/safe)
  if (cat.state !== 'scared' && cat.state !== 'toDest' && cat.state !== 'petted' &&
      cat.state !== 'inTree' && cat.state !== 'downTree' && cat.state !== 'held' &&
      cat.state !== 'pigeonRide' && cat.state !== 'pigeonDrop'){
    const nd = nearestDog();
    if (nd.dog && nd.d < 115){
      if (cat.target) cat.target.paused = false;
      cat.script = null; cat.wormTarget = null;
      cat.state = 'scared'; cat.scaredOf = nd.dog; cat.stateT = 0;
      say(cat, T.cat.scared, 1.3); playHiss();
    }
  }

  if (cat.state === 'held'){
    catSpeed = 0; catTarget = null;
    cat.x = player.x; cat.y = player.y;            // pinned; drawn up in the arms
    cat.pose = 'lay';
    const squirming = cat.stateT > cat.holdDur - 1.6;
    cat.squirmRot = squirming ? Math.sin(cat.stateT * 26) * 0.22 : 0;   // škubá se
    if (squirming && !cat._squirmed){ cat._squirmed = true; say(cat, T.cat.squirm, 1.6); playMumble(); }
    if (cat.stateT > cat.holdDur){                  // wants down — the person lets him
      cat.state = 'wander'; cat.stateT = 0; cat.squirmRot = 0;
      player.holding = false; say(cat, T.cat.down, 1.4);
    }
  }
  else if (cat.state === 'wander'){
    if (player.moving && player.moveStreak > 2){
      // heel: after steady walking the cat trots up in front / beside you
      cat.leadSwitchT -= dt;
      if (cat.leadSwitchT <= 0){ cat.leadSide = Math.random() < 0.5 ? 1 : -1; cat.leadSwitchT = 3 + Math.random() * 4; }
      const ax = Math.cos(player.moveAng), ay = Math.sin(player.moveAng);
      catTarget = { x: player.x + ax * 52 - ay * 26 * cat.leadSide,
                    y: player.y + ay * 52 + ax * 26 * cat.leadSide };
      // sprint to overtake, then settle to match the player's pace up front
      catSpeed = dist(cat, catTarget) > 30 ? 300 : 185;
      cat.sniffT = -1;                                   // don't stop to sniff while heeling
    } else {
      // otherwise circle the player, with fewer/shorter sniff stops
      cat.orbitA += dt * 1.7 * (Math.sin(cat.stateT * 0.5) > 0 ? 1 : -1);
      cat.orbitR = 80 + 40 * Math.sin(cat.stateT * 0.6 + 1.3)
                      + 22 * Math.sin(cat.stateT * 1.7);
      catTarget = { x: player.x + Math.cos(cat.orbitA) * cat.orbitR,
                    y: player.y + Math.sin(cat.orbitA) * cat.orbitR * 0.8 };
      catSpeed = 135 + 55 * Math.max(0, Math.sin(cat.stateT * 0.9));
      cat.sniffT -= dt;
      if (cat.sniffT <= 0){
        if (Math.random() < 0.15) cat.sniffT = 0.5 + Math.random() * 0.9;  // shorter, rarer
        else cat.sniffT = -(3 + Math.random() * 4);                        // (negative = walking window)
      }
      if (cat.sniffT > 0) catSpeed = 0;
    }
    // idle chatter — mutter about the noisy neighbours, or a quiet musing
    catChatCooldown -= dt;
    if (catChatCooldown <= 0 && !bubbles.some(b => b.ent === cat)){
      const noisyFolks = peds.some(p => dist(p, cat) < 340) ||
        (dest.state !== 'away' && dist(dest, cat) < 340);
      let pool;
      if (weatherLevel >= 2 && Math.random() < 0.7) pool = CAT_RAIN_LINES;
      else if (noisyFolks && Math.random() < 0.6) pool = CAT_STREET_LINES;
      else pool = CAT_MUSINGS;
      say(cat, pool[Math.floor(Math.random() * pool.length)], 2.8); playMumble();
      catChatCooldown = 18 + Math.random() * 16;
    }
    // occasional call of nature on a nearby patch of grass (within leash)
    cat.reliefCooldown -= dt;
    if (cat.state === 'wander' && cat.reliefCooldown <= 0){
      for (let k = 0; k < 6; k++){
        const ang = Math.random() * 6.28, rr = 20 + Math.random() * 70;
        const sx = cat.x + Math.cos(ang) * rr, sy = cat.y + Math.sin(ang) * rr;
        if (isGreen(sx, sy) && Math.hypot(player.x - sx, player.y - sy) < LEASH_LEN - 14){
          cat.state = 'toRelief'; cat.reliefSpot = { x: sx, y: sy };
          const r = Math.random();
          cat.reliefKind = r < 0.45 ? 'pee' : r < 0.8 ? 'poop' : 'both';
          cat.stateT = 0; break;
        }
      }
      if (cat.state === 'wander') cat.reliefCooldown = 6;   // none reachable, retry soon
    }
    // spot a hare and give chase (it always gets away)
    if (cat.state === 'wander'){
      for (const h of hares){
        if (dist(cat, h) < 170){
          cat.state = 'chaseHare'; cat.hareTarget = h; cat.stateT = 0;
          say(cat, T.cat.excited, 1); playMeow();
          break;
        }
      }
    }
    // a buzzing bug is irresistible — dart after it until it vanishes
    cat.bugCooldown -= dt;
    if (cat.state === 'wander' && cat.bugCooldown <= 0){
      for (const b of bugs){
        if (dist(cat, b) < 170){
          cat.state = 'chaseBug'; cat.bugTarget = b; cat.stateT = 0;
          say(cat, T.bug.spotted, 1); playMeow();
          break;
        }
      }
      if (cat.state === 'wander') cat.bugCooldown = 3;
    }
    // a pecking pigeon nearby is irresistible — he ALWAYS goes for it
    // (and this will not end how he expects)
    if (cat.state === 'wander'){
      for (const pg of pigeons){
        if (pg.state === 'ground' && !(pg.shyT > 0) && dist(cat, pg) < 220){
          cat.state = 'toPigeon'; cat.pigeonTarget = pg; cat.stateT = 0;
          say(cat, T.cat.excited, 1); playMeow();
          break;
        }
      }
    }
    // spot a hedgehog
    if (cat.state === 'wander' && catTalkCooldown <= 0){
      for (const h of hedgehogs){
        if (h.cooldown <= 0 && dist(cat, h) < 95){
          cat.state = 'approach'; cat.target = h; cat.stateT = 0;
          say(cat, T.cat.excited, 1.1); playMeow();
          break;
        }
      }
    }
    // the carried worm proves too tasty
    if (cat.state === 'wander' && cat.carriedWorm && cat.wormEatAt && playT >= cat.wormEatAt){
      cat.state = 'eatWorm'; cat.stateT = 0; cat.munch2 = false; playMunch();
    }
    // spot a worm to play with (unless already carrying one)
    cat.wormCooldown -= dt;
    if (cat.state === 'wander' && !cat.carriedWorm && cat.wormCooldown <= 0){
      for (const w of worms){
        if (w.state === 'out' && dist(cat, w) < 110 &&
            Math.hypot(player.x - w.x, player.y - w.y) < LEASH_LEN - 10){
          cat.state = 'toWorm'; cat.wormTarget = w; cat.stateT = 0;
          say(cat, T.cat.excited, 1);
          break;
        }
      }
    }
    // sudden urge to climb a nearby tree (must be within leash reach)
    cat.treeCooldown -= dt;
    if (cat.state === 'wander' && cat.treeCooldown <= 0){
      for (let ti = 0; ti < TREES.length; ti++){
        const t = TREES[ti];
        if (Math.hypot(cat.x - t[0], cat.y - t[1]) < 150 &&
            Math.hypot(player.x - t[0], player.y - t[1]) < LEASH_LEN - 10){
          const th = [100, 116, 84][ti % 3];   // sprite height of this tree variant
          cat.state = 'dashTree';
          cat.treeSpot = { x: t[0], y: t[1] + 4, perch: Math.round(th * 0.5) };
          cat.stateT = 0;
          break;
        }
      }
      if (cat.state === 'wander') cat.treeCooldown = 3;  // no tree around, re-check soon
    }
    // curiosity: go sniff a nearby parked car
    cat.carSniffCooldown -= dt;
    if (cat.state === 'wander' && cat.carSniffCooldown <= 0){
      for (const c of CARS){
        const cx = c.x + c.w / 2, cy = c.y + c.h;
        if (Math.hypot(cat.x - cx, cat.y - cy) < 150 &&
            Math.hypot(player.x - cx, player.y - cy) < LEASH_LEN - 12){
          cat.state = 'toCar'; cat.carSpot = { x: cx, y: cy }; cat.stateT = 0; break;
        }
      }
      if (cat.state === 'wander') cat.carSniffCooldown = 5;
    }
    // stop and stare at a discarded Braník bottle
    cat.bottleCooldown -= dt;
    if (cat.state === 'wander' && cat.bottleCooldown <= 0){
      for (const b of BOTTLES){
        if (Math.hypot(cat.x - b[0], cat.y - b[1]) < 150 &&
            Math.hypot(player.x - b[0], player.y - b[1]) < LEASH_LEN - 12){
          cat.state = 'toBottle'; cat.bottleSpot = { x: b[0], y: b[1] }; cat.stateT = 0; break;
        }
      }
      if (cat.state === 'wander') cat.bottleCooldown = 5;
    }
    // flop and roll in the dusty road
    cat.rollCooldown -= dt;
    if (cat.state === 'wander' && cat.rollCooldown <= 0 && isOnRoad(cat.x, cat.y)){
      cat.state = 'roll'; cat.stateT = 0;
    } else if (cat.rollCooldown <= 0){
      cat.rollCooldown = 4;   // not on a road right now, re-check soon
    }
  }
  else if (cat.state === 'roll'){
    catSpeed = 0;
    cat.pose = (Math.floor(cat.stateT / 0.24) % 2) ? 'roll1' : 'roll0';   // wriggle
    if (cat.stateT > 3.5){
      cat.state = 'wander'; cat.stateT = 0; cat.rollCooldown = 30 + Math.random() * 30;
      if (!bubbles.some(b => b.ent === cat)){ say(cat, CAT_MUSINGS[Math.floor(Math.random()*CAT_MUSINGS.length)], 2.4); playMumble(); }
    }
  }
  else if (cat.state === 'toBottle'){
    catTarget = { x: cat.bottleSpot.x - 24, y: cat.bottleSpot.y + 4 }; catSpeed = 120;
    if (dist(cat, catTarget) < 16){
      cat.state = 'stareBottle'; cat.stateT = 0; catTarget = null; catSpeed = 0;
      cat.flip = cat.bottleSpot.x < cat.x;
      if (!bubbles.some(b => b.ent === player)) say(player, T.player.bottle, 4);   // "…dvoulitrovej Brankář Zbýšo…"
    } else if (cat.stateT > 4){ cat.state = 'wander'; cat.stateT = 0; cat.bottleCooldown = 15; }
  }
  else if (cat.state === 'stareBottle'){
    catSpeed = 0; cat.pose = 'stalk0';               // fixated, low and still
    cat.flip = cat.bottleSpot.x < cat.x;
    if (cat.stateT > 4.5){ cat.state = 'wander'; cat.stateT = 0; cat.bottleCooldown = 30 + Math.random() * 30; }
  }
  else if (cat.state === 'toCar'){
    catTarget = cat.carSpot; catSpeed = 120;
    if (dist(cat, cat.carSpot) < 16){ cat.state = 'sniffCar'; cat.stateT = 0; catTarget = null; catSpeed = 0; }
    else if (cat.stateT > 4){ cat.state = 'wander'; cat.stateT = 0; cat.carSniffCooldown = 15; }
  }
  else if (cat.state === 'sniffCar'){
    catSpeed = 0;
    cat.flip = cat.carSpot.x < cat.x;
    cat.pose = (Math.floor(cat.stateT / 0.4) % 2) ? 'stalk1' : 'stalk0';   // slow sniff bob
    if (cat.stateT > 3.5){
      cat.state = 'wander'; cat.stateT = 0; cat.carSniffCooldown = 28 + Math.random() * 30;
      if (!bubbles.some(b => b.ent === cat)){ say(cat, CAT_MUSINGS[Math.floor(Math.random()*CAT_MUSINGS.length)], 2.4); playMumble(); }
    }
  }
  else if (cat.state === 'watchHedge'){
    catSpeed = 0; cat.pose = 'lay';
    const h = cat.target;
    if (h) cat.flip = h.x < cat.x;                 // keep an eye on it as it wanders
    if (!h || cat.stateT > cat.watchDur || (h && dist(cat, h) > 200)){
      if (h) h.cooldown = 20;
      cat.state = 'wander'; cat.stateT = 0; catTalkCooldown = 6;
      if (!bubbles.some(b => b.ent === cat)){ say(cat, CAT_MUSINGS[Math.floor(Math.random()*CAT_MUSINGS.length)], 2.6); playMumble(); }
    }
  }
  else if (cat.state === 'approach'){
    // stalk the hedgehog — it keeps wandering, the cat follows it
    catTarget = cat.target; catSpeed = 130;
    if (dist(cat, cat.target) < 30){
      const h = cat.target;
      catTarget = null; catSpeed = 0;   // stop this tick or the walk pose overwrites the pose
      if (!cat.carriedWorm && Math.random() < 0.5){
        // just lie down and watch it for a long while (it keeps wandering)
        cat.state = 'watchHedge'; cat.stateT = 0; cat.pose = 'lay';
        cat.watchDur = 8 + Math.random() * 6;
      } else {
        cat.state = 'lay'; cat.stateT = 0; cat.pose = 'lay';
        h.paused = true;
        if (cat.carriedWorm){
          // deliver the worm — the hedgehog is grateful and shares real info
          cat.script = [
            { at: 0.8, fn(){ playMunch(); say(h, dest.state !== 'away' ? WORM_INFO_ARRIVED
                : arrivalMode === 'tram' ? WORM_INFO_SOON : WORM_INFO_WINDOW, 7); } },
            { at: 6.2, fn(){ say(cat, T.cat.wormComment, 2.2); } },
            { at: 8.6, fn(){
                if (cat.carriedWorm) cat.carriedWorm.state = 'gone';
                cat.carriedWorm = null;
                h.talked = true; h.cooldown = 30; h.paused = false;
                cat.state = 'wander'; cat.stateT = 0; catTalkCooldown = 7;
            } }
          ];
        } else {
          cat.script = [
            { at: 0.8, fn(){ say(h, h.talked ? HEDGE_ALT[Math.floor(Math.random()*HEDGE_ALT.length)] : h.line); } },
            { at: 4.6, fn(){ say(cat, CAT_LINES[Math.floor(Math.random()*CAT_LINES.length)]); playMumble(); } },
            { at: 7.0, fn(){
                h.talked = true; h.cooldown = 30; h.paused = false;
                cat.state = 'wander'; cat.stateT = 0; catTalkCooldown = 7;
            } }
          ];
        }
      }
    } else if (cat.stateT > 4){ // gave up (leash too short etc.)
      cat.target.paused = false;
      cat.state = 'wander'; cat.stateT = 0; catTalkCooldown = 4;
    }
  }
  else if (cat.state === 'lay'){
    catSpeed = 0;
    if (cat.script){
      for (const step of cat.script){
        if (!step.done && cat.stateT >= step.at){ step.done = true; step.fn(); }
      }
    }
  }
  else if (cat.state === 'eatWorm'){
    catSpeed = 0;
    cat.pose = (Math.floor(cat.stateT / 0.2) % 2) ? 'stalk1' : 'stalk0';
    if (cat.stateT > 0.7 && !cat.munch2){ cat.munch2 = true; playMunch(); }   // mlask, mlask
    if (cat.stateT > 1.4){
      if (cat.carriedWorm) cat.carriedWorm.state = 'gone';
      cat.carriedWorm = null; cat.wormEatAt = null;
      cat.state = 'wander'; cat.stateT = 0;
      say(cat, EAT_LINES[Math.floor(Math.random() * EAT_LINES.length)], 2.6);
    }
  }
  else if (cat.state === 'chaseHare'){
    const h = cat.hareTarget;
    // hare gone, escaped, or he's chased long enough — give up (never catches it)
    if (!h || hares.indexOf(h) < 0 || dist(cat, h) > 340 || cat.stateT > 5){
      cat.state = 'wander'; cat.stateT = 0; catTalkCooldown = 3;
    } else { catTarget = h; catSpeed = 235; }         // the leash reins him in anyway
  }
  else if (cat.state === 'chaseBug'){
    const b = cat.bugTarget;
    if (cat.pounce){
      // mid-leap: sail along the arc he committed to (the bug slips aside)
      catSpeed = 0;
      const P = cat.pounce; P.t += dt;
      const p = Math.min(1, P.t / P.dur);
      cat.x = P.x0 + (P.x1 - P.x0) * p;
      cat.y = P.y0 + (P.y1 - P.y0) * p;
      cat.zOff = Math.sin(p * Math.PI) * 26;
      cat.flip = P.x1 < P.x0;
      if (p >= 1){ cat.pounce = null; cat.zOff = 0; cat.pounceCd = 0.7 + Math.random() * 0.9; }
    }
    // it dissolved, drifted out of reach, or he's been at it long enough
    else if (!b || bugs.indexOf(b) < 0 || b.t > b.life || dist(cat, b) > 320 || cat.stateT > 9){
      const gone = !b || bugs.indexOf(b) < 0 || b.t > b.life;
      cat.state = 'wander'; cat.stateT = 0; cat.bugTarget = null;
      cat.bugCooldown = 10 + Math.random() * 10; catTalkCooldown = 4;
      if (gone && !bubbles.some(bb => bb.ent === cat)){
        say(cat, T.bug.gone[Math.floor(Math.random() * T.bug.gone.length)], 2.4); playMumble();
      }
    } else {
      cat.pounceCd -= dt;
      const d = dist(cat, b);
      if (d < 64 && cat.pounceCd <= 0){
        // wind-up done — leap at where it's headed (it always gets away)
        const lead = 10 + Math.random() * 14;
        cat.pounce = { x0: cat.x, y0: cat.y, t: 0, dur: 0.38,
                       x1: b.x + Math.cos(b.dir) * lead, y1: b.y + Math.sin(b.dir) * lead,
                       variant: Math.floor(Math.random() * SPR.jumpcat.length) };
        catSpeed = 0;
      } else if (d < 64){
        catSpeed = 0; cat.flip = b.x < cat.x;      // crouched, coiling for the next leap
        cat.pose = 'stalk0';
      } else { catTarget = b; catSpeed = 225; }
    }
  }
  else if (cat.state === 'toPigeon'){
    const pg = cat.pigeonTarget;
    if (!pg || pg.state !== 'ground' || pigeons.indexOf(pg) < 0){
      cat.state = 'wander'; cat.stateT = 0; cat.pigeonTarget = null;
    } else {
      catTarget = pg; catSpeed = 200;
      if (dist(cat, pg) < 24){
        // the pigeon panics, snatches the harness and takes off with him
        pg.state = 'carry'; pg.landTarget = pickPigeonLanding(pg);
        say(pg, T.pigeon.startle, 1.2);
        cat.state = 'pigeonRide'; cat.stateT = 0; cat._rideYelled = false;
        playHiss();
      } else if (cat.stateT > 8){                    // truly stuck behind something
        pg.shyT = 5;                                 // that bird gets a moment's peace
        cat.state = 'wander'; cat.stateT = 0; cat.pigeonTarget = null;
      }
    }
  }
  else if (cat.state === 'pigeonRide'){
    catSpeed = 0; cat.pose = 'scared';
    const pg = cat.pigeonTarget;
    if (!pg || pg.state !== 'carry'){ cat.state = 'pigeonDrop'; cat.stateT = 0; }
    else {
      cat.x = pg.x; cat.y = pg.y; cat.flip = pg.flip;   // dangling under the pigeon
      if (!cat._rideYelled && cat.stateT > 0.5){
        cat._rideYelled = true;
        say(cat, T.pigeon.flight[Math.floor(Math.random() * T.pigeon.flight.length)], 2.6); playMeow();
        say(player, T.pigeon.playerShout, 2.4);
      }
    }
  }
  else if (cat.state === 'pigeonDrop'){
    catSpeed = 0; cat.pose = 'scared';                 // falling the last bit
    if (cat.zOff < 3){
      cat.state = 'wander'; cat.stateT = 0; cat.pigeonTarget = null; catTalkCooldown = 5;
      say(cat, T.pigeon.landed[Math.floor(Math.random() * T.pigeon.landed.length)], 2.8); playMumble();
    }
  }
  else if (cat.state === 'toWorm'){
    const w = cat.wormTarget;
    if (!w || w.state !== 'out'){ cat.state = 'wander'; cat.stateT = 0; }
    else {
      catTarget = w; catSpeed = 200;
      if (dist(cat, w) < 18){ cat.state = 'playWorm'; cat.stateT = 0; }
      else if (cat.stateT > 4){ cat.state = 'wander'; cat.stateT = 0; }
    }
  }
  else if (cat.state === 'playWorm'){
    catSpeed = 0;
    const w = cat.wormTarget;
    if (!w || w.state !== 'out' || dist(cat, w) > 34){   // expired or dragged away
      cat.state = 'wander'; cat.stateT = 0; cat.wormTarget = null;
    } else {
      // bat it around a bit before taking it
      w.x += Math.sin(cat.stateT * 9) * 30 * dt;
      w.y += Math.cos(cat.stateT * 7) * 20 * dt;
      cat.flip = w.x < cat.x;
      cat.pose = (Math.floor(cat.stateT / 0.18) % 2) ? 'stalk1' : 'stalk0';
      if (cat.stateT > 3.2){
        w.state = 'carried'; cat.carriedWorm = w; cat.wormTarget = null;
        cat.state = 'wander'; cat.stateT = 0;
        // sometimes the temptation wins before he finds a hedgehog
        cat.wormEatAt = Math.random() < 0.35 ? playT + 4 + Math.random() * 6 : null;
        say(cat, T.cat.gotWorm, 1.4);
      }
    }
  }
  else if (cat.state === 'dashTree'){
    catTarget = cat.treeSpot; catSpeed = 240;
    if (dist(cat, cat.treeSpot) < 30){
      cat.state = 'inTree'; cat.stateT = 0; cat.pose = 'climb';
      catTarget = null; catSpeed = 0;
    } else if (cat.stateT > 3){          // leash too short after all
      cat.state = 'wander'; cat.stateT = 0; cat.treeCooldown = 10;
    }
  }
  else if (cat.state === 'inTree'){
    catSpeed = 0;
    // dragged off by the leash, or done lounging -> jump down
    if (cat.stateT > 3 || dist(cat, cat.treeSpot) > 40){
      cat.state = 'downTree'; cat.stateT = 0;
    }
  }
  else if (cat.state === 'downTree'){
    catSpeed = 0; cat.pose = 'climb';   // cling & descend, stay put until landed
    if (cat.zOff < 3){
      cat.state = 'wander'; cat.stateT = 0;
      cat.treeCooldown = 14 + Math.random() * 12;
      say(cat, T.cat.hop, 1);
    }
  }
  else if (cat.state === 'scared'){
    const dg = cat.scaredOf;
    const d = dg ? dist(cat, dg) : 999;
    if (dist(cat, player) > 40){
      // bolt toward the player, away from the dog
      const ax = dg ? (cat.x - dg.x) : 0, ay = dg ? (cat.y - dg.y) : 0;
      const al = Math.hypot(ax, ay) || 1;
      catTarget = { x: player.x * 0.7 + (cat.x + ax / al * 60) * 0.3,
                    y: player.y * 0.7 + (cat.y + ay / al * 60) * 0.3 };
      catSpeed = 210;
    } else { catSpeed = 0; cat.pose = 'scared'; }   // cower by the owner
    if ((!dg || d > 180) && cat.stateT > 1.5){ cat.state = 'wander'; cat.stateT = 0; }
  }
  else if (cat.state === 'toRelief'){
    catTarget = cat.reliefSpot; catSpeed = 120;
    if (dist(cat, cat.reliefSpot) < 12){
      cat.state = 'relief'; cat.stateT = 0; catTarget = null; catSpeed = 0;
    } else if (cat.stateT > 4){ cat.state = 'wander'; cat.stateT = 0; cat.reliefCooldown = 20; }
  }
  else if (cat.state === 'relief'){
    catSpeed = 0; cat.pose = 'stalk0';   // low squat
    if (cat.stateT > 2.2){
      const sp = cat.reliefSpot;
      if (cat.reliefKind === 'pee' || cat.reliefKind === 'both') marks.push({ x: sp.x, y: sp.y, kind: 'pee' });
      if (cat.reliefKind === 'poop' || cat.reliefKind === 'both') marks.push({ x: sp.x + 7, y: sp.y + 2, kind: 'poop' });
      if (marks.length > 24) marks.splice(0, marks.length - 24);
      say(cat, cat.reliefKind === 'pee' ? T.cat.pee : T.cat.poop, 2);
      cat.state = 'bury'; cat.stateT = 0; cat.buryT = 0;
    }
  }
  else if (cat.state === 'bury'){
    catSpeed = 0;
    // turn to the spot and scratch, kicking a little dirt over it
    cat.flip = cat.reliefSpot.x < cat.x;
    cat.animT += dt;
    cat.pose = (Math.floor(cat.animT / 0.12) % 2) ? 'bury1' : 'bury0';   // fast scratch
    cat.buryT -= dt;
    if (cat.buryT <= 0){
      const dir = cat.flip ? -1 : 1;
      dirt.push({ x: cat.x + dir * 16, y: cat.y - 4, vx: dir * (40 + Math.random() * 50),
                  vy: -70 - Math.random() * 45, t: 0 });
      cat.buryT = 0.11;
    }
    if (cat.stateT > 1.9){
      cat.state = 'wander'; cat.stateT = 0;
      cat.reliefCooldown = 45 + Math.random() * 40;
    }
  }
  else if (cat.state === 'toDest'){
    catTarget = { x: dest.x + (dest.kind === 'man' ? 34 : -30), y: dest.y + 6 };
    catSpeed = 120;
    if (dist(cat, catTarget) < 14){
      cat.state = 'petted'; cat.pose = 'lay'; cat.stateT = 0;
      catTarget = null; catSpeed = 0;
      dest.pose = 'pet';
      say(cat, T.cat.purr, 3); playPurr(3.5);
      setTimeout(showEnd, 2200);
    }
  }

  if (catTarget && catSpeed > 0){
    const d = dist(cat, catTarget);
    if (d > 6){
      const vx = (catTarget.x - cat.x) / d, vy = (catTarget.y - cat.y) / d;
      cat.x += vx * catSpeed * dt;
      cat.y += vy * catSpeed * dt;
      cat.flip = vx < 0;
      if (cat.state === 'scared'){ cat.pose = 'scared'; }
      else {
        cat.animT += dt;
        const gait = (cat.state === 'approach' || cat.state === 'toPigeon') ? 'stalk'
                   : (weatherLevel >= 2 && cat.state === 'wander') ? 'hunch' : 'walk';
        cat.pose = gait + ((Math.floor(cat.animT / 0.22) % 2) ? '1' : '0');
      }
    } else if (cat.state === 'wander'){
      cat.pose = (weatherLevel >= 2) ? 'hunch0' : 'walk0';
    }
  }
  // jump up into / down from the canopy (drawn height above the ground spot);
  // the pigeon ride lifts him to a fixed cruising height. A bug pounce drives
  // zOff itself (its own sine arc), so the easing stays out of its way.
  if (cat.pounce && cat.state !== 'chaseBug') cat.pounce = null;   // interrupted mid-leap
  const zTarget = (cat.state === 'inTree' && cat.treeSpot) ? cat.treeSpot.perch
                : (cat.state === 'pigeonRide') ? 54 : 0;
  if (!cat.pounce) cat.zOff += clamp(zTarget - cat.zOff, -260 * dt, 260 * dt);

  // leash constraint (not during ending, and not while the cat is in the arms)
  if (gameState === 'play' && cat.state !== 'held'){
    // while examining something interesting, the cat digs in and anchors YOU
    const planted = ['lay','watchHedge','sniffCar','stareBottle','roll','relief','bury','playWorm'].includes(cat.state);
    const d = dist(cat, player);
    if (cat.state === 'pigeonRide' || cat.state === 'pigeonDrop' || cat.state === 'toPigeon'){
      // charging the bird or airborne behind it — the leash tows the PLAYER,
      // so he always reaches the pigeon and the ride always happens
      if (d > LEASH_LEN){
        const vx = (player.x - cat.x) / d, vy = (player.y - cat.y) / d;
        player.x = cat.x + vx * LEASH_LEN;
        player.y = cat.y + vy * LEASH_LEN;
      }
      cat.dragT = 0;
    } else if (planted){
      if (d > LEASH_LEN){
        const vx = (player.x - cat.x) / d, vy = (player.y - cat.y) / d;
        player.x = cat.x + vx * LEASH_LEN;     // he holds his ground — pull the player back
        player.y = cat.y + vy * LEASH_LEN;
        cat.dragT += dt;
        if (cat.dragT > 1.4){                   // you insist long enough — he relents
          if (cat.target){ cat.target.paused = false; cat.target.cooldown = 10; }
          cat.script = null; cat.wormTarget = null;
          cat.state = 'wander'; cat.stateT = 0; catTalkCooldown = 5;
          say(cat, T.cat.dragged, 1.6); cat.dragT = 0;
          // …and actually comes: block every instant re-plant for a while,
          // otherwise "už jdu" flops right back down on the same spot
          cat.rollCooldown = Math.max(cat.rollCooldown, 12);
          cat.carSniffCooldown = Math.max(cat.carSniffCooldown, 10);
          cat.bottleCooldown = Math.max(cat.bottleCooldown, 10);
          cat.reliefCooldown = Math.max(cat.reliefCooldown, 15);
          cat.wormCooldown = 8;
        }
      } else cat.dragT = 0;
    } else if (d > LEASH_LEN){                   // normal: the cat is reined to the player
      const vx = (cat.x - player.x) / d, vy = (cat.y - player.y) / d;
      cat.x = player.x + vx * LEASH_LEN;
      cat.y = player.y + vy * LEASH_LEN;
      cat.dragT += dt;
      if (cat.dragT > 0.6 && cat.sniffT > 0) cat.sniffT = -2;   // no sniff-sitting while towed
    } else {
      cat.dragT = 0;
    }
  }
  if (cat.state !== 'pigeonRide' && cat.state !== 'pigeonDrop') collide(cat);   // airborne clears obstacles

  // ---- hedgehogs ----
  for (const h of hedgehogs){
    h.cooldown -= dt;
    if (h.paused){
      // dupat — stomp its feet while it's the one talking to the cat
      if (h === cat.target && cat.state === 'lay' && bubbles.some(b => b.ent === h)){
        h.animT += dt;
        const beat = Math.floor(h.animT / 0.26);
        h.pose = (beat % 2) ? 'walk1' : 'walk0';
        if (beat !== h.lastBeat){ h.lastBeat = beat; playThump(); }
      }
      continue;
    }
    h.moveT -= dt;
    if (h.moveT <= 0){
      h.dir = Math.random() * Math.PI * 2;
      h.moveT = 1.5 + Math.random() * 3;
      if (Math.random() < 0.3) h.moveT = -1 - Math.random(); // pause (negative)
    }
    if (h.moveT > 0){
      h.x += Math.cos(h.dir) * 26 * dt;
      h.y += Math.sin(h.dir) * 26 * dt;
      h.flip = Math.cos(h.dir) < 0;
      h.animT += dt;
      h.pose = (Math.floor(h.animT / 0.3) % 2) ? 'walk1' : 'walk0';
      collide(h);
    }
  }

  // ---- bubbles ----
  bubbles = bubbles.filter(b => (b.t += dt) < b.dur);

  // ---- reach destination ----
  if (gameState === 'play' && dest.state === 'waiting' && dist(player, dest) < 95 &&
      (cat.state === 'wander' || cat.state === 'approach' ||
       cat.state === 'dashTree' || cat.state === 'toWorm' || cat.state === 'scared' ||
       cat.state === 'toRelief' || cat.state === 'relief' || cat.state === 'bury' ||
       cat.state === 'chaseHare' || cat.state === 'toCar' || cat.state === 'sniffCar' ||
       cat.state === 'watchHedge' || cat.state === 'toBottle' || cat.state === 'stareBottle' ||
       cat.state === 'roll' || cat.state === 'toPigeon' || cat.state === 'chaseBug')){
    gameState = 'ending';
    if (cat.target) cat.target.paused = false;
    cat.state = 'toDest'; cat.stateT = 0;
    player.pose = 'walk0';
  }

  // ---- camera ----
  const tx = clamp(player.x - VW / 2, 0, Math.max(0, WORLD_W - VW));
  const ty = clamp(player.y - VH / 2, 0, Math.max(0, WORLD_H - VH));
  if (!camInit){ camX = tx; camY = ty; camInit = true; }
  camX += (tx - camX) * Math.min(1, dt * 4);
  camY += (ty - camY) * Math.min(1, dt * 4);
}

function showEnd(){
  gameState = 'done';
  document.getElementById('endText').innerHTML =
    T.ui.endText.replace('{who}', T.ui.endWho[chosen] || 'On');
  document.getElementById('endScreen').classList.remove('hidden');
}

// ===================== RENDER =====================
function drawSprite(spr, variant, ent, anchorH){
  const img = spr[variant];
  const sc = ent.scale || 1;
  const w = spr.w * sc, h = spr.h * sc;
  ctx.save();
  ctx.translate(ent.x - camX, ent.y - camY);
  if (ent.rot) ctx.rotate(ent.rot);
  if (ent.flip) ctx.scale(-1, 1);
  ctx.drawImage(img, -w / 2, -(anchorH !== undefined ? anchorH * sc : h), w, h);
  ctx.restore();
}

function shadow(ent, rw, rh){
  // low western sun: shadows stretch east and lengthen toward dusk,
  // then fade away once darkness takes over
  const dayT = dayPhase();
  const len = 1.2 + dayT * 2.2;
  const a = 0.12 * clamp(1 - (dayT - 0.55) / 0.3, 0, 1);
  if (a <= 0.004) return;
  ctx.save();
  ctx.globalAlpha = a;
  ctx.fillStyle = INK;
  ctx.beginPath();
  ctx.ellipse(ent.x - camX + rw * len * 0.7, ent.y - camY + 2, rw * len, rh, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function wob(n, seedShift){ // tiny deterministic wobble for hand-drawn HUD bits
  return Math.sin(n * 12.9898 + seedShift * 78.233) * 2;
}

function drawLeash(variant){
  if (gameState !== 'play' || cat.state === 'held') return;   // no taut leash while cradled
  const hx = player.x - camX + (player.flip ? -10 : 10);
  const hy = player.y - camY - 44;
  const cx2 = cat.x - camX, cy2 = cat.y - camY - 14 - cat.zOff;
  const d = Math.hypot(cx2 - hx, cy2 - hy);
  const slack = Math.max(0, LEASH_LEN - d);
  const sag = Math.min(42, slack * 0.4);
  const mx = (hx + cx2) / 2 + wob(1, variant), my = (hy + cy2) / 2 + sag;
  ctx.save();
  ctx.strokeStyle = PAL.leash;
  ctx.lineWidth = 2.4;
  ctx.beginPath();
  ctx.moveTo(hx, hy);
  ctx.quadraticCurveTo(mx, my, cx2, cy2);
  ctx.stroke();
  ctx.restore();
}

function wrapText(text, maxW){
  const words = text.split(' ');
  const lines = []; let line = '';
  ctx.font = '15px "Pangolin","Bradley Hand","Segoe Print","Comic Sans MS",cursive';
  for (const w of words){
    const t = line ? line + ' ' + w : w;
    if (ctx.measureText(t).width > maxW && line){ lines.push(line); line = w; }
    else line = t;
  }
  if (line) lines.push(line);
  return lines;
}

function drawBubbles(variant){
  for (const b of bubbles){
    const e = b.ent;
    const top = e.isDog ? 30 : e === cat ? 42 + cat.zOff : hedgehogs.includes(e) ? 42
              : pigeons.includes(e) ? 30 + e.zOff : 116;
    const lines = wrapText(b.text, 190);
    const lw = Math.max(...lines.map(l => ctx.measureText(l).width));
    const bw = lw + 24, bh = lines.length * 19 + 16;
    let bx = e.x - camX - bw / 2, by = e.y - camY - top - bh - 14;
    bx = clamp(bx, 6, VW - bw - 6); by = clamp(by, 6, VH - bh - 6);
    ctx.save();
    // hand-wobbled rounded rect
    ctx.fillStyle = '#fdf8ea';
    ctx.strokeStyle = INK; ctx.lineWidth = 2;
    ctx.beginPath();
    const r = 10, w1 = wob(bx, variant), w2 = wob(by, variant + 1);
    ctx.moveTo(bx + r, by + w1 * 0.4);
    ctx.lineTo(bx + bw - r, by - w2 * 0.4);
    ctx.quadraticCurveTo(bx + bw, by, bx + bw + w1 * 0.3, by + r);
    ctx.lineTo(bx + bw + w2 * 0.3, by + bh - r);
    ctx.quadraticCurveTo(bx + bw, by + bh, bx + bw - r, by + bh + w1 * 0.4);
    ctx.lineTo(bx + r, by + bh - w2 * 0.4);
    ctx.quadraticCurveTo(bx, by + bh, bx - w1 * 0.3, by + bh - r);
    ctx.lineTo(bx - w2 * 0.3, by + r);
    ctx.quadraticCurveTo(bx, by, bx + r, by + w1 * 0.4);
    ctx.closePath();
    ctx.fill(); ctx.stroke();
    // tail
    ctx.beginPath();
    ctx.moveTo(clamp(e.x - camX - 6, bx + 12, bx + bw - 24), by + bh - 1);
    ctx.lineTo(e.x - camX, e.y - camY - top + 4);
    ctx.lineTo(clamp(e.x - camX + 8, bx + 16, bx + bw - 12), by + bh - 1);
    ctx.closePath();
    ctx.fillStyle = '#fdf8ea'; ctx.fill();
    ctx.strokeStyle = INK; ctx.stroke();
    // text
    ctx.fillStyle = INK;
    ctx.font = '15px "Pangolin","Bradley Hand","Segoe Print","Comic Sans MS",cursive';
    lines.forEach((l, i) => ctx.fillText(l, bx + 12, by + 22 + i * 19));
    ctx.restore();
  }
}

// ---------- day-night cycle ----------
// starts shortly before sunset, ends in near-darkness with lamps lit
const night = document.createElement('canvas');
function dayPhase(){ return clamp((40 + playT) / 340, 0, 1); }
function lampIntensity(i, dayT){
  const th = 0.5 + ((i * 37) % 10) * 0.02;               // staggered switch-on
  return clamp((dayT - th) * 340 / 3.5, 0, 1);           // gradual fade-in over ~3.5s
}
function punchGlow(ng, sx, sy, r, strength){
  if (sx < -r || sx > VW + r || sy < -r || sy > VH + r) return;
  const grad = ng.createRadialGradient(sx, sy, 0, sx, sy, r);
  grad.addColorStop(0,    `rgba(0,0,0,${strength})`);
  grad.addColorStop(0.35, `rgba(0,0,0,${strength * 0.7})`);
  grad.addColorStop(0.65, `rgba(0,0,0,${strength * 0.28})`);
  grad.addColorStop(0.85, `rgba(0,0,0,${strength * 0.09})`);
  grad.addColorStop(1,    'rgba(0,0,0,0)');
  ng.fillStyle = grad;
  ng.beginPath(); ng.arc(sx, sy, r, 0, Math.PI * 2); ng.fill();
}
function drawNight(){
  const dayT = dayPhase();
  // warm sunset tint, strongest mid-dusk
  const warm = Math.sin(dayT * Math.PI) * 0.16;
  if (warm > 0.01){
    ctx.save();
    ctx.globalAlpha = warm;
    ctx.globalCompositeOperation = 'multiply';
    ctx.fillStyle = '#e8974f';
    ctx.fillRect(0, 0, VW, VH);
    ctx.restore();
  }
  const darkA = Math.pow(dayT, 1.6) * 0.62;
  if (darkA < 0.02 || VW < 1 || VH < 1) return;
  if (night.width !== VW || night.height !== VH){ night.width = VW; night.height = VH; }
  const ng = night.getContext('2d');
  ng.globalCompositeOperation = 'source-over';
  ng.clearRect(0, 0, VW, VH);
  ng.fillStyle = `rgba(24,26,58,${darkA})`;
  ng.fillRect(0, 0, VW, VH);
  // punch out light pools before compositing the darkness
  ng.globalCompositeOperation = 'destination-out';
  LAMPS.forEach((L, i) => {
    const it = lampIntensity(i, dayT);
    if (it > 0.01) punchGlow(ng, L[0] - camX, L[1] - 46 - camY, 150, 0.9 * it);
  });
  LITWINS.forEach(w => punchGlow(ng, w[0] - camX, w[1] - camY, 46, 0.5));
  winFolks.forEach(f => punchGlow(ng, f.x - camX, f.y - camY, 44, 0.5));
  ctx.drawImage(night, 0, 0);
  // bright lamp heads on top of the darkness (brightness ramps with intensity)
  LAMPS.forEach((L, i) => {
    const it = lampIntensity(i, dayT);
    if (it <= 0.01) return;
    const sx = L[0] - camX, sy = L[1] - 48 - camY;
    if (sx < -40 || sx > VW + 40 || sy < -40 || sy > VH + 40) return;
    ctx.save();
    const halo = ctx.createRadialGradient(sx, sy, 0, sx, sy, 30);
    halo.addColorStop(0, `rgba(255,217,138,${0.5 * it})`);
    halo.addColorStop(1, 'rgba(255,217,138,0)');
    ctx.fillStyle = halo;
    ctx.beginPath(); ctx.arc(sx, sy, 30, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 0.85 * it;
    ctx.fillStyle = '#ffd98a';
    ctx.beginPath(); ctx.arc(sx, sy, 5, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  });
}

function drawHudArrow(variant){
  if (gameState !== 'play') return;
  // before the other person arrives, the arrow tracks the incoming tram
  let tx, ty;
  if (dest.state !== 'away'){ tx = dest.x; ty = dest.y - 60; }
  else if (tram.state === 'arriving' || tram.state === 'doors'){ tx = tram.x; ty = tram.y; }
  else if (arrivalMode === 'window' && peek.visible){ tx = PEEK.x; ty = PEEK.y - 15; }
  else return;
  const sx = tx - camX, sy = ty - camY;
  if (sx > 30 && sx < VW - 30 && sy > 30 && sy < VH - 30) return; // visible
  const cx2 = VW / 2, cy2 = VH / 2;
  const a = Math.atan2(sy - cy2, sx - cx2);
  const px = clamp(cx2 + Math.cos(a) * (Math.min(VW, VH) / 2 - 46), 40, VW - 40);
  const py = clamp(cy2 + Math.sin(a) * (Math.min(VW, VH) / 2 - 46), 40, VH - 40);
  ctx.save();
  ctx.translate(px, py); ctx.rotate(a);
  ctx.strokeStyle = INK; ctx.fillStyle = '#fdf8ea'; ctx.lineWidth = 2.4;
  const j = wob(3, variant);
  ctx.beginPath();
  ctx.moveTo(16 + j * 0.4, 0); ctx.lineTo(-10, -11 + j * 0.3);
  ctx.lineTo(-4, 0); ctx.lineTo(-10 - j * 0.3, 11);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  ctx.restore();
}

function drawPuddles(){
  for (const p of puddles){
    if (p.size < 0.04) continue;
    const sx = p.x - camX, sy = p.y - camY;
    if (sx < -60 || sx > VW + 60 || sy < -50 || sy > VH + 50) continue;
    const rw = 8 + 26 * p.size, rh = rw * 0.42, a = Math.min(1, p.size * 1.6);
    ctx.save();
    ctx.globalAlpha = 0.3 * a; ctx.fillStyle = '#8fa7c4';
    ctx.beginPath(); ctx.ellipse(sx, sy, rw, rh, 0, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 0.25 * a; ctx.fillStyle = '#dce7f2';
    ctx.beginPath(); ctx.ellipse(sx - rw*0.24, sy - rh*0.22, rw*0.42, rh*0.34, 0, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }
}

function drawWeather(){
  // overcast gloom deepens with the weather level
  const gloom = [0, 0.1, 0.22, 0.38][weatherLevel];
  if (gloom > 0){
    ctx.save(); ctx.globalAlpha = gloom;
    ctx.fillStyle = '#3a4157'; ctx.fillRect(0, 0, VW, VH); ctx.restore();
  }
  if (RAIN.length){
    // chunky hand-drawn drops — thick rounded strokes in an inky blue-grey
    ctx.save();
    ctx.strokeStyle = '#5a6a92'; ctx.lineCap = 'round'; ctx.globalAlpha = 0.55;
    for (const d of RAIN){
      ctx.lineWidth = d.w;
      ctx.beginPath();
      ctx.moveTo(d.x, d.y);
      ctx.lineTo(d.x + d.wind * 0.02 - 1.5, d.y + d.len);
      ctx.stroke();
    }
    ctx.restore();
  }
  if (flash > 0){                                // lightning
    ctx.save();
    ctx.globalAlpha = flash * 0.55; ctx.fillStyle = '#f6f0d8';
    ctx.fillRect(0, 0, VW, VH);
    if (boltPts && flash > 0.45){
      // hand-drawn jagged bolt via Rough.js (re-randomises each frame -> glitchy)
      if (!roughMain) roughMain = rough.canvas(cvs);
      ctx.globalAlpha = flash * 0.5;
      roughMain.linearPath(boltPts, {stroke:'#fff3c8', strokeWidth:7, roughness:2.5, bowing:1});
      ctx.globalAlpha = flash;
      roughMain.linearPath(boltPts, {stroke:'#fffef0', strokeWidth:2.6, roughness:2.9, bowing:1.2});
      if (boltFork) roughMain.linearPath(boltFork, {stroke:'#fffef0', strokeWidth:2, roughness:2.9, bowing:1.2});
    }
    ctx.restore();
  }
}

function drawDogLeashes(){
  for (const p of peds){
    if (!p.dog || !p.dog.leashed) continue;
    ctx.save();
    ctx.strokeStyle = '#7a6b5a'; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(p.x - camX + (p.flip ? -8 : 8), p.y - camY - 40);
    ctx.lineTo(p.dog.x - camX, p.dog.y - camY - 10 * p.dog.scale);
    ctx.stroke();
    ctx.restore();
  }
}

function drawMuteIcon(){
  const x = VW - 30, y = 26;
  ctx.save();
  // soft paper chip so the control is findable over any background
  ctx.globalAlpha = 0.7; ctx.fillStyle = '#fdf8ea';
  ctx.beginPath(); ctx.arc(x + 2, y, 18, 0, Math.PI * 2); ctx.fill();
  ctx.globalAlpha = 0.85; ctx.strokeStyle = INK; ctx.fillStyle = INK; ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(x-8,y-4); ctx.lineTo(x-3,y-4); ctx.lineTo(x+2,y-9);
  ctx.lineTo(x+2,y+9); ctx.lineTo(x-3,y+4); ctx.lineTo(x-8,y+4); ctx.closePath(); ctx.fill();
  if (muted){
    ctx.beginPath(); ctx.moveTo(x+6,y-6); ctx.lineTo(x+14,y+6); ctx.moveTo(x+14,y-6); ctx.lineTo(x+6,y+6); ctx.stroke();
  } else {
    ctx.beginPath(); ctx.arc(x+5,y,5,-0.6,0.6); ctx.stroke();
    ctx.beginPath(); ctx.arc(x+5,y,9,-0.6,0.6); ctx.stroke();
  }
  ctx.restore();
}

function drawJoystick(){
  if (!joy.active) return;
  ctx.save();
  ctx.globalAlpha = 0.4;
  ctx.strokeStyle = INK; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.arc(joy.ox, joy.oy, 52, 0, Math.PI * 2); ctx.stroke();
  ctx.globalAlpha = 0.55;
  ctx.fillStyle = INK;
  ctx.beginPath();
  ctx.arc(joy.ox + joy.dx * 42, joy.oy + joy.dy * 42, 17, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

// ---------- intro: a big cat leaping across the select-screen background ----------
const introCat = { active: false, t: 0, dur: 0.5, x0: 0, x1: 0, y0: 0, y1: 0, arc: 0, variant: 0, flip: false };
let introTimer = 0.6 + Math.random() * 1.2;
function updateIntro(dt){
  if (introCat.active){
    if ((introCat.t += dt) >= introCat.dur) introCat.active = false;
  } else if ((introTimer -= dt) <= 0){
    const dir = Math.random() < 0.5 ? 1 : -1;
    introCat.active = true; introCat.t = 0;
    introCat.dur = 0.4 + Math.random() * 0.25;
    introCat.flip = dir < 0;
    introCat.x0 = dir > 0 ? -160 : VW + 160;
    introCat.x1 = dir > 0 ? VW + 160 : -160;
    introCat.y0 = 140 + Math.random() * Math.max(40, VH - 300);
    introCat.y1 = introCat.y0 + (Math.random() * 140 - 70);
    introCat.arc = 130 + Math.random() * 170;
    introCat.variant = Math.floor(Math.random() * JUMP_LEGS.length);
    introTimer = 1.1 + Math.random() * 2.3;                 // gap between glimpses
  }
}
function drawIntroDecor(){
  // loose, abstract sketches of the game's world around the edges of the
  // select screen (fixed seeds so they stay stable, no boiling)
  if (!roughMain) roughMain = rough.canvas(cvs);
  const rc = roughMain, gy = VH - 44;
  [[74, gy], [VW-86, gy-6], [92, 96]].forEach((p, i) => {          // abstract trees
    rc.line(p[0], p[1], p[0], p[1]-34, opts(700+i, null, null, {stroke:PAL.hairM, strokeWidth:5, roughness:2.7}));
    rc.circle(p[0], p[1]-52, 50, opts(710+i, PAL.green, 'zigzag',
      {hachureGap:10, fillWeight:2.6, strokeWidth:2, roughness:2.8, bowing:3, hachureAngle:(i*3%7-3)*24}));
  });
  [[168, gy+4], [VW-168, gy+2]].forEach((p, i) => {                // abstract lamps
    rc.line(p[0], p[1], p[0], p[1]-66, opts(720+i, null, null, {strokeWidth:3.4, roughness:2.4}));
    rc.circle(p[0], p[1]-72, 13, opts(722+i, PAL.winLit, 'solid', {roughness:1.6}));
  });
  [[VW*0.33, gy+16], [VW*0.67, gy+18]].forEach((p, i) => {         // abstract hedgehogs
    const bx = p[0], by = p[1];
    rc.polygon([[bx-18,by],[bx-13,by-14],[bx+2,by-18],[bx+18,by-9],[bx+20,by]],
      opts(730+i, PAL.hedge, 'hachure', {hachureGap:3, fillWeight:2.6, strokeWidth:2, roughness:2}));
    for (let k = 0; k < 6; k++)
      rc.line(bx-13+k*6, by-9-(k%2)*3, bx-17+k*7, by-25, opts(740+i*9+k, null, null, {strokeWidth:1.8, roughness:1.6}));
    rc.circle(bx+18, by-6, 2, opts(749+i, INK, 'solid'));
  });
}

function drawIntro(){
  if (!introCat.active) return;
  const p = introCat.t / introCat.dur;
  const x = introCat.x0 + (introCat.x1 - introCat.x0) * p;
  const y = introCat.y0 + (introCat.y1 - introCat.y0) * p - Math.sin(p * Math.PI) * introCat.arc;
  const spr = SPR.jumpcat[introCat.variant], img = spr[0], sc = 2.3;
  ctx.save();
  ctx.globalAlpha = 0.85;
  ctx.translate(x, y);
  if (introCat.flip) ctx.scale(-1, 1);
  ctx.drawImage(img, -spr.w * sc / 2, -spr.h * sc / 2, spr.w * sc, spr.h * sc);
  ctx.restore();
}

function render(now){
  const variant = Math.floor(now / BOIL_MS) % 2;
  ctx.fillStyle = PAPER;
  ctx.fillRect(0, 0, VW, VH);
  if (gameState === 'start'){ drawIntroDecor(); drawIntro(); return; }

  // world
  ctx.drawImage(worldLayers[variant],
    camX, camY, VW, VH, 0, 0, VW, VH);

  // marks the cat left on the grass (flat decals, under everything)
  marks.forEach(m => drawSprite(SPR.mark[m.kind], variant,
    { x: m.x, y: m.y }, SPR.mark[m.kind].h * 0.5));
  dirt.forEach(d => {
    const sx = d.x - camX, sy = d.y - camY;
    ctx.save(); ctx.globalAlpha = clamp(1 - d.t / 0.6, 0, 1) * 0.85; ctx.fillStyle = '#8a6b4a';
    ctx.beginPath(); ctx.arc(sx, sy, 2.2, 0, Math.PI * 2); ctx.fill(); ctx.restore();
  });
  drawPuddles();

  // shadows
  shadow(player, 16, 5); shadow(cat, 18, 5);
  if (dest.state !== 'away') shadow(dest, 16, 5);
  if (tram.state === 'arriving' || tram.state === 'doors' || tram.state === 'leaving')
    shadow({ x: tram.x, y: tram.y + 34 }, 95, 8);
  movingCars.forEach(mc => shadow({ x: mc.x, y: mc.y }, 40, 8));
  peds.forEach(p => { shadow(p, 15, 5); if (p.dog) shadow(p.dog, 18 * p.dog.scale, 5); });
  hedgehogs.forEach(h => shadow(h, 14, 4));
  hares.forEach(h => shadow(h, 14, 4));
  pigeons.forEach(pg => { if (pg.state === 'ground') shadow(pg, 10, 3); });
  BOTTLES.forEach(b => shadow({ x: b[0], y: b[1] }, 8, 3));
  TREES.forEach(t => {
    const e = { x: t[0], y: t[1] };
    shadow(e, 20, 6);
  });

  drawLeash(variant);
  drawDogLeashes();

  // y-sorted entities
  const ents = [];
  ents.push({ y: player.y, draw: () => drawSprite(SPR[player.kind][player.pose], variant, player) });
  movingCars.forEach(mc => ents.push({ y: mc.y, draw: () =>
    drawSprite(SPR.car[mc.spr], variant, { x: mc.x, y: mc.y, flip: mc.vx < 0 }) }));
  peds.forEach(p => {
    ents.push({ y: p.y, draw: () => drawSprite(SPR.ped[p.variant][p.pose], variant, p) });
    if (p.dog) ents.push({ y: p.dog.y, draw: () => drawSprite(
      SPR.dog[p.dog.type + (p.dog.pose === 'walk1' ? '1' : '0')], variant,
      { x: p.dog.x, y: p.dog.y, flip: p.dog.flip, scale: p.dog.scale }) });
  });
  if (dest.state !== 'away')
    ents.push({ y: dest.y, draw: () => drawSprite(SPR[dest.kind][dest.pose], variant, dest) });
  if (tram.state === 'arriving' || tram.state === 'doors' || tram.state === 'leaving')
    ents.push({ y: tram.y + 38, draw: () => drawSprite(SPR.tram.idle, variant,
      { x: tram.x, y: tram.y + 38, flip: false }) });
  worms.forEach(w => {
    if (w.state !== 'emerging' && w.state !== 'out') return;
    ents.push({ y: w.y, draw: () => {
      drawSprite(SPR.mound.idle, variant, { x: w.x, y: w.y + 2, flip: false });
      if (w.state === 'out')
        drawSprite(SPR.worm.idle, variant, { x: w.x, y: w.y - 2, flip: false });
    } });
  });
  // while in a tree, sort just below the tree's anchor so he draws over its canopy
  const catUp = (cat.state === 'inTree' || cat.state === 'downTree') && cat.treeSpot;
  const catHeld = cat.state === 'held';
  ents.push({ y: catHeld ? player.y + 1 : (catUp ? cat.treeSpot.y + 12 : cat.y),
              draw: () => {
    if (catHeld){    // curled up in the person's arms, wriggling near the end
      drawSprite(SPR.cat.lay, variant,
        { x: player.x + (player.flip ? -3 : 3), y: player.y - 38, flip: player.flip, rot: cat.squirmRot });
      return;
    }
    // in a tree, face so the paws grip the trunk (flip when on the tree's right)
    const catFlip = catUp ? (cat.x > cat.treeSpot.x) : cat.flip;
    // mid-pounce he stretches into the big leaping sprite, scaled down
    const catSpr = cat.pounce ? SPR.jumpcat[cat.pounce.variant] : SPR.cat[cat.pose];
    drawSprite(catSpr, variant, { x: cat.x, y: cat.y - cat.zOff, flip: catFlip,
                                  scale: cat.pounce ? 0.72 : 1 });
    if (cat.carriedWorm)
      drawSprite(SPR.worm.idle, variant,
        { x: cat.x + (cat.flip ? -26 : 26), y: cat.y - 10 - cat.zOff, flip: cat.flip });
  } });
  hedgehogs.forEach(h => ents.push({ y: h.y, draw: () => drawSprite(SPR.hedge[h.pose], variant, h) }));
  hares.forEach(h => ents.push({ y: h.y, draw: () => drawSprite(SPR.hare[h.pose], variant, h) }));
  // pigeons draw at their flight height; the carrier sorts just above the cat
  pigeons.forEach(pg => ents.push({ y: pg.y + (pg.state === 'carry' ? 2 : 0), draw: () =>
    drawSprite(SPR.pigeon[pg.pose], variant, { x: pg.x, y: pg.y - pg.zOff, flip: pg.flip }) }));
  bugs.forEach(b => ents.push({ y: b.y, draw: () => {
    ctx.save();
    ctx.globalAlpha = clamp(b.fade, 0, 1);
    drawSprite(SPR.bug[b.type][b.pose], variant, { x: b.x, y: b.y - b.zOff, flip: b.flip });
    ctx.restore();
  } }));
  BOTTLES.forEach(b => ents.push({ y: b[1], draw: () => drawSprite(SPR.bottle.idle, variant, { x: b[0], y: b[1], flip: false }) }));
  TREES.forEach((t, i) => ents.push({ y: t[1], draw: () => drawSprite(SPR.tree['v' + (i % 3)], variant, { x: t[0], y: t[1], flip: false }) }));
  ents.sort((a, b) => a.y - b.y);
  ents.forEach(e => e.draw());

  // the awaited person peeking from their window (window arrival mode) —
  // centred on the actual window (anchorH = half height)
  if (arrivalMode === 'window' && peek.visible && dest.kind)
    drawSprite(SPR.face[dest.kind], variant, { x: PEEK.x, y: PEEK.y }, SPR.face[dest.kind].h / 2);

  // ambient neighbours & cats framed in their windows
  winFolks.forEach(f => drawSprite(f.spr, variant,
    { x: f.x, y: f.y, flip: f.flip }, f.spr.h / 2));

  drawNight();
  drawWeather();
  drawBubbles(variant);
  drawHudArrow(variant);
  drawJoystick();
  drawMuteIcon();

  // paper grain
  if (!grainPattern) grainPattern = ctx.createPattern(grain, 'repeat');
  ctx.save();
  ctx.globalAlpha = 0.06;
  ctx.globalCompositeOperation = 'multiply';
  ctx.fillStyle = grainPattern;
  ctx.fillRect(0, 0, VW, VH);
  ctx.restore();
}

// ===================== LOOP =====================
// frame-rate independent simulation: each animation frame simulates the WHOLE
// real time that passed, split into steps small enough (<= 50ms) to stay
// stable — so game time tracks real time even at low FPS on older devices
// (a per-frame dt clamp used to stretch every timer there). At 60 fps this is
// exactly one update per frame, same as before.
const MAX_SIM = 0.25, SIM_CHUNK = 0.05;
let last = performance.now();
function loop(now){
  let frame = (now - last) / 1000;
  last = now;
  if (frame > MAX_SIM) frame = MAX_SIM;   // tab switch / long stall — don't fast-forward
  if (gameState === 'start') updateIntro(frame);
  const n = Math.max(1, Math.ceil(frame / SIM_CHUNK));
  const d = frame / n;
  for (let i = 0; i < n; i++) update(d);
  render(now);
  updateAudio();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ===================== START SCREEN =====================
function paintPortrait(id, kind){
  const c = document.getElementById(id);
  const g = c.getContext('2d');
  g.fillStyle = '#fdf6e6'; g.fillRect(0, 0, c.width, c.height);
  const img = SPR[kind].walk0[0];
  g.drawImage(img, 60 - SPR[kind].walk0.w * 0.7, 172 - SPR[kind].walk0.h * 1.4,
    SPR[kind].walk0.w * 1.4, SPR[kind].walk0.h * 1.4);
}
paintPortrait('pw', 'woman');
paintPortrait('pm', 'man');

function pick(kind){
  chosen = kind;
  player.kind = kind;
  dest.kind = kind === 'woman' ? 'man' : 'woman';
  document.getElementById('startScreen').classList.add('hidden');
  gameState = 'play';
  initAudio();
  say(cat, T.cat.start, 2.4);
  playMeow();
}
document.getElementById('pickWoman').addEventListener('click', () => pick('woman'));
document.getElementById('pickMan').addEventListener('click', () => pick('man'));
</script>
