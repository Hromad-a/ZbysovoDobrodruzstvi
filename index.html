<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Zbýšovo Dobrodružství</title>
<script src="rough.min.js"></script>
<style>
  @font-face{
    font-family:"Pangolin";
    src:url("Pangolin-Regular.ttf") format("truetype");
    font-display:swap;
  }
  :root{
    --ink:#3a4066; --paper:#f4ead2; --pink:#e7b7b0; --green:#8fae72;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%;overflow:hidden;background:var(--paper);
    font-family:"Pangolin","Bradley Hand","Segoe Print","Comic Sans MS","Chalkboard SE",cursive;
    color:var(--ink); touch-action:none; -webkit-user-select:none; user-select:none;}
  canvas#game{display:block;width:100vw;height:100vh}
  .overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:clamp(8px,2.5vh,18px);background:var(--paper);z-index:10;padding:16px;text-align:center}
  .overlay.hidden{display:none}
  h1{font-size:clamp(26px,6vw,52px);margin:0;transform:rotate(-2deg);letter-spacing:1px}
  .sub{font-size:clamp(13px,3vw,19px);max-width:520px;line-height:1.4;transform:rotate(.5deg)}
  .chars{display:flex;gap:clamp(14px,4vw,28px);flex-wrap:nowrap;justify-content:center}
  button.char{background:#fdf6e6;border:2.5px solid var(--ink);cursor:pointer;padding:clamp(8px,2vw,16px) clamp(12px,3vw,22px) clamp(6px,1.5vw,12px);
    border-radius:20px 7px 24px 9px/9px 22px 7px 20px;
    font-family:inherit;color:var(--ink);font-size:17px;transition:transform .15s, box-shadow .15s;
    box-shadow:5px 6px 0 rgba(58,64,102,.18), inset 0 0 0 1.5px rgba(58,64,102,.25)}
  button.char:nth-child(1){transform:rotate(-1.8deg)}
  button.char:nth-child(2){transform:rotate(1.8deg)}
  button.char:hover,button.char:focus-visible{transform:rotate(0) scale(1.06);
    outline:2.5px dashed var(--ink);outline-offset:5px;
    box-shadow:7px 9px 0 rgba(58,64,102,.22), inset 0 0 0 1.5px rgba(58,64,102,.35)}
  button.char canvas{display:block;margin:0 auto 4px;width:clamp(66px,22vw,116px);height:auto}
  button.char .lbl{display:block;margin-top:2px;font-size:clamp(16px,4vw,21px);letter-spacing:1px;transform:rotate(-1deg)}
  .hint{font-size:clamp(11px,2.6vw,13px);opacity:.75;margin-top:6px}
  @media (max-height:520px){
    button.char canvas{width:clamp(48px,14vh,90px)}
    h1{font-size:clamp(22px,5vh,40px)}
    .sub{font-size:clamp(11px,2.6vh,16px)}
  }
  #startScreen{background:transparent}
  #endScreen{background:rgba(244,234,210,.94)}
  #endScreen p{font-size:clamp(16px,3.5vw,22px);max-width:480px;line-height:1.6}
  button.again{background:#fdf6e6;border:3px solid var(--ink);color:var(--ink);font-family:inherit;
    font-size:18px;padding:10px 26px;cursor:pointer;transform:rotate(-1deg);
    border-radius:14px 5px 16px 7px/7px 15px 5px 14px}
  button.again:hover{transform:rotate(.5deg) scale(1.05)}
  @media (prefers-reduced-motion: reduce){ button{transition:none} }
</style>
</head>
<body>

<canvas id="game"></canvas>

<div class="overlay" id="startScreen">

  <div class="chars">
    <button class="char" id="pickWoman"><canvas id="pw" width="120" height="180"></canvas><span class="lbl">ona</span></button>

</div>

<script>
'use strict';
/* ============================================================
   ZBÝŠOVO DOBRODRUŽSTVÍ — sketchy placeholder prototype
   Rough.js art, boiling-line animation, Prague panelák vibes
   ============================================================ */

// ---------- constants ----------
const INK   = '#3a4066';
const PAPER = '#f4ead2';
const PAL = {
  pink:'#e7b7b0', green:'#8fae72', darkgreen:'#6f9457', road:'#9aa3b2',
  panel1:'#d9c9a8', panel2:'#c7b4c9', panel3:'#a8bfc9', panel4:'#dbb08a',
  brick:'#bd6b4f', skin:'#f0c9a0', hairW:'#d1592a', hairM:'#6b4a36',
  dressW:'#5f9ea0', coatM:'#c98f4a', cat:'#2b2b30', hedge:'#8a5a33',
  hedgeFace:'#c9a06b', leash:'#b0413e', win:'#f2e2b0', winLit:'#f0c25e',
  car1:'#7fa88f', car2:'#b7c9e0', car3:'#e0c48a'
};
const WORLD_W = 2000, WORLD_H = 1500;
const LEASH_LEN = 150;
const BOIL_MS = 280;                 // boiling-line swap period
const SS = 2;                        // sprite supersampling

// ---------- canvas / dpr ----------
const cvs = document.getElementById('game');
const ctx = cvs.getContext('2d');
let VW = 0, VH = 0, DPR = 1;
function resize(){
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  VW = window.innerWidth; VH = window.innerHeight;
  cvs.width = VW * DPR; cvs.height = VH * DPR;
  // CSS size must match innerWidth/Height exactly — 100vh overshoots the
  // visible area on mobile (URL bar), stretching the canvas so touch
  // coordinates no longer line up with what is drawn
  cvs.style.width = VW + 'px'; cvs.style.height = VH + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener('resize', resize); resize();

// ---------- rough helpers ----------
function opts(seed, fill, style, extra){
  const o = {
    seed: seed, stroke: INK, strokeWidth: 2.2, roughness: 2.0, bowing: 2,
    fillWeight: 2, hachureGap: 6, disableMultiStroke: false
  };
  if (fill){
    o.fill = fill; o.fillStyle = style || 'hachure';
    // vary the fill direction per shape (from its seed) so it isn't all one
    // uniform diagonal — more like a kid filling each object its own way
    if (o.fillStyle !== 'solid') o.hachureAngle = ((seed % 9) - 4) * 21;
  }
  if (extra) Object.assign(o, extra);
  return o;
}

// ---------- sprite factory (2 boil variants each) ----------
function makeSprite(w, h, drawFn){
  const out = [];
  for (let v = 0; v < 2; v++){
    const c = document.createElement('canvas');
    c.width = w * SS; c.height = h * SS;
    const g = c.getContext('2d');
    g.scale(SS, SS);
    const rc = rough.canvas(c);
    drawFn(rc, g, 100 + v * 37);       // different seed => boiling line
    out.push(c);
  }
  out.w = w; out.h = h;
  return out;
}

// ===================== SPRITES =====================
// Figures are drawn front-view, child-map style; anchor = bottom center.

function drawWoman(rc, g, s, pose){
  // pose: 'walk0' | 'walk1' | 'pet'
  const kneel = pose === 'pet';
  const oy = kneel ? 22 : 0;                    // sink down when kneeling
  // legs
  if (pose === 'walk0'){
    rc.line(28, 96, 22, 118, opts(s+1, null, null, {strokeWidth:3}));
    rc.line(36, 96, 42, 118, opts(s+2, null, null, {strokeWidth:3}));
  } else if (pose === 'walk1'){
    rc.line(30, 96, 30, 118, opts(s+1, null, null, {strokeWidth:3}));
    rc.line(34, 96, 35, 118, opts(s+2, null, null, {strokeWidth:3}));
  } else if (pose === 'sit'){
    // short, folded, dangling legs — seated
    rc.line(28, 98, 25, 104, opts(s+1, null, null, {strokeWidth:3}));   // L thigh (short)
    rc.line(25, 104, 27, 111, opts(s+13, null, null, {strokeWidth:3})); // L shin dangles
    rc.line(36, 98, 39, 104, opts(s+2, null, null, {strokeWidth:3}));   // R thigh
    rc.line(39, 104, 37, 111, opts(s+14, null, null, {strokeWidth:3})); // R shin dangles
  } else if (pose === 'hold'){
    rc.line(29, 96, 27, 118, opts(s+1, null, null, {strokeWidth:3}));    // standing
    rc.line(35, 96, 37, 118, opts(s+2, null, null, {strokeWidth:3}));
  } else {
    rc.line(26, 112, 44, 116, opts(s+1, null, null, {strokeWidth:3})); // folded legs
  }
  // dress (long trapezoid, Modigliani-ish)
  rc.polygon([[24,52+oy],[40,52+oy],[50,100+oy*0.3],[14,100+oy*0.3]],
    opts(s+3, PAL.dressW, 'hachure', {hachureGap:5}));
  // arms
  if (kneel){
    rc.line(26, 60+oy, 4, 92, opts(s+4, null, null, {strokeWidth:3}));   // petting arm
  } else if (pose === 'hold'){
    rc.line(26, 60, 31, 74, opts(s+4, null, null, {strokeWidth:3}));     // arms cradle the cat
    rc.line(38, 60, 33, 74, opts(s+5, null, null, {strokeWidth:3}));
  } else {
    rc.line(26, 58, 18, 84, opts(s+4, null, null, {strokeWidth:3}));
    rc.line(38, 58, 47, 82, opts(s+5, null, null, {strokeWidth:3}));
  }
  // long neck
  rc.line(32, 52+oy, 33, 40+oy, opts(s+6, null, null, {strokeWidth:4}));
  // elongated tilted head
  rc.ellipse(33, 26+oy, 20, 32, opts(s+7, PAL.skin, 'solid', {roughness:1.6, bowing:2.5}));
  // hair — orange mikádo bob: crown cap, blunt fringe, straight side curtains to the jaw
  rc.arc(33, 22+oy, 26, 30, Math.PI*0.95, Math.PI*2.08, true,
    opts(s+8, PAL.hairW, 'hachure', {hachureGap:3, fillWeight:2.4}));
  rc.polygon([[21,20+oy],[19,40+oy],[26,40+oy],[25,22+oy]],
    opts(s+9, PAL.hairW, 'hachure', {hachureGap:2.6, fillWeight:2.2, strokeWidth:1.8}));
  rc.polygon([[45,20+oy],[47,40+oy],[40,40+oy],[41,22+oy]],
    opts(s+15, PAL.hairW, 'hachure', {hachureGap:2.6, fillWeight:2.2, strokeWidth:1.8}));
  rc.line(25, 15+oy, 41, 15+oy, opts(s+16, null, null, {stroke:PAL.hairW, strokeWidth:5, roughness:1.6}));
  // empty Modigliani eyes + tiny mouth
  rc.line(28, 24+oy, 31, 24+oy, opts(s+10, null, null, {strokeWidth:1.6, roughness:1}));
  rc.line(36, 24+oy, 39, 24+oy, opts(s+11, null, null, {strokeWidth:1.6, roughness:1}));
  rc.line(31, 34+oy, 35, 33.4+oy, opts(s+12, null, null, {strokeWidth:1.4, roughness:1}));
}

function drawMan(rc, g, s, pose){
  const kneel = pose === 'pet';
  const oy = kneel ? 22 : 0;
  // legs (trousers)
  if (pose === 'walk0'){
    rc.line(27, 94, 20, 118, opts(s+1, null, null, {strokeWidth:4}));
    rc.line(37, 94, 44, 118, opts(s+2, null, null, {strokeWidth:4}));
  } else if (pose === 'walk1'){
    rc.line(29, 94, 28, 118, opts(s+1, null, null, {strokeWidth:4}));
    rc.line(35, 94, 37, 118, opts(s+2, null, null, {strokeWidth:4}));
  } else if (pose === 'phone'){
    rc.line(29, 94, 27, 118, opts(s+1, null, null, {strokeWidth:4}));
    rc.line(35, 94, 37, 118, opts(s+2, null, null, {strokeWidth:4}));
  } else if (pose === 'sit'){
    // short, folded, dangling legs — seated
    rc.line(28, 96, 25, 103, opts(s+1, null, null, {strokeWidth:4}));   // L thigh (short)
    rc.line(25, 103, 27, 110, opts(s+13, null, null, {strokeWidth:4})); // L shin dangles
    rc.line(37, 96, 40, 103, opts(s+2, null, null, {strokeWidth:4}));   // R thigh
    rc.line(40, 103, 38, 110, opts(s+14, null, null, {strokeWidth:4})); // R shin dangles
  } else if (pose === 'hold'){
    rc.line(29, 94, 27, 118, opts(s+1, null, null, {strokeWidth:4}));    // standing
    rc.line(35, 94, 37, 118, opts(s+2, null, null, {strokeWidth:4}));
  } else {
    rc.line(24, 112, 44, 115, opts(s+1, null, null, {strokeWidth:4}));
  }
  // coat — boxy
  rc.polygon([[22,50+oy],[42,50+oy],[46,96+oy*0.3],[18,96+oy*0.3]],
    opts(s+3, PAL.coatM, 'hachure', {hachureGap:5}));
  // arms
  if (kneel){
    rc.line(40, 58+oy, 60, 92, opts(s+4, null, null, {strokeWidth:3.4}));
  } else if (pose === 'hold'){
    rc.line(24, 58, 30, 74, opts(s+4, null, null, {strokeWidth:3.4}));   // arms cradle the cat
    rc.line(40, 58, 34, 74, opts(s+5, null, null, {strokeWidth:3.4}));
  } else if (pose === 'phone'){
    // one arm raised, holding the phone out to the side
    rc.line(24, 56, 16, 84, opts(s+4, null, null, {strokeWidth:3.4}));   // other arm relaxed down
    rc.line(40, 58, 52, 64, opts(s+5, null, null, {strokeWidth:3.4}));   // arm out to the side
    rc.rectangle(51, 58, 9, 13, opts(s+13, '#b7c9e0', 'solid', {strokeWidth:1.6, roughness:1}));
    rc.line(53, 61, 58, 61, opts(s+14, null, null, {stroke:'#eef6ff', strokeWidth:1.2, roughness:.8}));
  } else {
    rc.line(24, 56, 15, 82, opts(s+4, null, null, {strokeWidth:3.4}));
    rc.line(40, 56, 48, 80, opts(s+5, null, null, {strokeWidth:3.4}));
  }
  // neck + narrow long head
  rc.line(32, 50+oy, 32, 40+oy, opts(s+6, null, null, {strokeWidth:4.4}));
  rc.ellipse(32, 25+oy, 19, 30, opts(s+7, PAL.skin, 'solid', {roughness:1.6, bowing:2.5}));
  // brown hair blob
  rc.ellipse(32, 12+oy, 20, 12, opts(s+8, PAL.hairM, 'hachure', {hachureGap:2.6, fillWeight:2.2}));
  // face
  rc.line(27, 23+oy, 30, 23+oy, opts(s+10, null, null, {strokeWidth:1.6, roughness:1}));
  rc.line(35, 23+oy, 38, 23+oy, opts(s+11, null, null, {strokeWidth:1.6, roughness:1}));
  rc.line(30, 33+oy, 34, 33+oy, opts(s+12, null, null, {strokeWidth:1.4, roughness:1}));

function drawCat(rc, g, s, pose){

    rc.curve([[12,36],[4,30],[10,22],[18,26]], opts(s+4, null, null, {stroke:PAL.cat, strokeWidth:4}));

  } else if (pose === 'stalk0' || pose === 'stalk1'){
    // stalking — low crouch, head stretched forward, locked-on eyes
    const step = pose === 'stalk1' ? 3 : 0;
    rc.line(20, 40, 17 + step, 46, opts(s+1, null, null, {stroke:PAL.cat, strokeWidth:3}));
    rc.line(29, 40, 30 - step, 46, opts(s+2, null, null, {stroke:PAL.cat, strokeWidth:3}));

    rc.ellipse(56, 30, 18, 13, opts(s+5, PAL.cat, 'hachure', {hachureGap:2.2, fillWeight:2.6}));

    rc.polygon([[57,25],[62,19],[64,27]], opts(s+7, PAL.cat, 'solid'));
    // tail straight and low, tip twitching

    // big focused eyes with pupils

    rc.circle(59.6, 29, 1.7, opts(s+16, INK, 'solid', {stroke:INK, roughness:.5}));
    // whiskers forward
    rc.line(62, 32, 70, 30, opts(s+12, null, null, {stroke:PAPER, strokeWidth:1, roughness:.8}));
    rc.line(62, 34, 69, 35, opts(s+13, null, null, {stroke:PAPER, strokeWidth:1, roughness:.8}));

  const body = '#9aa3b2', wing = '#6e7a8c';
  if (pose === 'fly0' || pose === 'fly1'){
    // airborne — legs tucked, wings beating; anchor bottom-centre of 48x44
    const up = pose === 'fly0';
    rc.polygon([[6,28],[0,22],[2,32]], opts(s+4, wing, 'solid', {roughness:1.2}));       // tail fan
    rc.ellipse(22, 27, 30, 14, opts(s, body, 'hachure', {hachureGap:2.4, fillWeight:2.2, strokeWidth:2}));
    rc.circle(37, 21, 11, opts(s+1, body, 'hachure', {hachureGap:2.2, fillWeight:2, strokeWidth:2}));
    rc.polygon([[42,20],[47,22],[42,24]], opts(s+2, '#d9a441', 'solid', {roughness:.8})); // beak
    rc.circle(38, 19, 1.6, opts(s+3, INK, 'solid', {roughness:.5}));
    if (up) rc.polygon([[16,23],[8,3],[30,15]], opts(s+5, wing, 'hachure', {hachureGap:2.2, fillWeight:2.2, strokeWidth:2}));
    else    rc.polygon([[16,27],[10,42],[32,33]], opts(s+5, wing, 'hachure', {hachureGap:2.2, fillWeight:2.2, strokeWidth:2}));
  } else {
    // pecking about on the ground; the head bobs down in walk1 — 40x32
    const peck = pose === 'walk1';
    rc.line(16, 24, 15, 31, opts(s+6, null, null, {stroke:'#c76a5a', strokeWidth:2}));    // red legs
    rc.line(22, 24, 24, 31, opts(s+7, null, null, {stroke:'#c76a5a', strokeWidth:2}));
    rc.polygon([[6,18],[0,12],[3,22]], opts(s+4, wing, 'solid', {roughness:1.2}));        // tail
    rc.ellipse(18, 18, 26, 15, opts(s, body, 'hachure', {hachureGap:2.4, fillWeight:2.2, strokeWidth:2}));
    rc.ellipse(18, 17, 14, 9, opts(s+5, wing, 'hachure', {hachureGap:2.2, fillWeight:1.8, strokeWidth:1.4})); // folded wing
    const hx = peck ? 30 : 28, hy = peck ? 16 : 8;
    rc.circle(hx, hy, 10, opts(s+1, body, 'hachure', {hachureGap:2.2, fillWeight:2, strokeWidth:2}));
    rc.polygon([[hx+4,hy-1],[hx+9,hy+2],[hx+4,hy+3]], opts(s+2, '#d9a441', 'solid', {roughness:.8}));
    rc.circle(hx+1, hy-2, 1.6, opts(s+3, INK, 'solid', {roughness:.5}));
  }
}

function drawBug(rc, g, s, type, pose){
  // tiny flying critters the cat chases; two wing poses = fast flap
  const up = pose === 'w0';
  if (type === 'fly'){
    // 14x12 — plump black body, stubby wings
    rc.circle(6, 8, 6, opts(s, '#33333a', 'solid', {stroke:INK, roughness:.9}));
    if (up){
      rc.ellipse(9, 3, 8, 4, opts(s+1, '#c9d2dd', 'solid', {strokeWidth:1, roughness:.9}));
      rc.ellipse(3, 3, 8, 4, opts(s+2, '#c9d2dd', 'solid', {strokeWidth:1, roughness:.9}));
    } else {
      rc.ellipse(10, 7, 8, 4, opts(s+1, '#c9d2dd', 'solid', {strokeWidth:1, roughness:.9}));
      rc.ellipse(2, 7, 8, 4, opts(s+2, '#c9d2dd', 'solid', {strokeWidth:1, roughness:.9}));
    }
  } else if (type === 'mosquito'){
    // 16x16 — thin whiny thing with dangling legs
    rc.line(3, 8, 11, 7, opts(s, null, null, {strokeWidth:1.8, roughness:1}));            // body
    rc.circle(12, 7, 3, opts(s+1, INK, 'solid', {roughness:.6}));                          // head
    rc.line(13, 7, 16, 8, opts(s+2, null, null, {strokeWidth:1, roughness:.8}));           // proboscis
    rc.line(6, 9, 4, 15, opts(s+3, null, null, {strokeWidth:1, roughness:1}));             // legs
    rc.line(8, 9, 8, 15, opts(s+4, null, null, {strokeWidth:1, roughness:1}));
    rc.line(10, 9, 12, 15, opts(s+5, null, null, {strokeWidth:1, roughness:1}));
    const wy = up ? 2 : 6;
    rc.ellipse(7, wy, 9, 4, opts(s+6, '#dde5ee', 'solid', {strokeWidth:1, roughness:.9}));
  } else {
    // moth — 22x18, fat fuzzy body, big pale wings
    rc.ellipse(11, 11, 8, 10, opts(s, '#b3a284', 'hachure', {hachureGap:1.8, fillWeight:1.6, strokeWidth:1.4}));
    rc.line(9, 4, 6, 1, opts(s+1, null, null, {strokeWidth:1, roughness:1}));              // antennae
    rc.line(13, 4, 16, 1, opts(s+2, null, null, {strokeWidth:1, roughness:1}));
    if (up){
      rc.polygon([[9,9],[0,2],[2,13]], opts(s+3, '#d8ccae', 'hachure', {hachureGap:2, fillWeight:1.6, strokeWidth:1.4}));
      rc.polygon([[13,9],[22,2],[20,13]], opts(s+4, '#d8ccae', 'hachure', {hachureGap:2, fillWeight:1.6, strokeWidth:1.4}));
    } else {
      rc.polygon([[9,11],[1,14],[4,17]], opts(s+3, '#d8ccae', 'hachure', {hachureGap:2, fillWeight:1.6, strokeWidth:1.4}));
      rc.polygon([[13,11],[21,14],[18,17]], opts(s+4, '#d8ccae', 'hachure', {hachureGap:2, fillWeight:1.6, strokeWidth:1.4}));
    }
  }
}

function drawDog(rc, g, s, pose, col){

  const step = pose === 'walk1' ? 3 : 0;
  rc.line(24, 40, 22 - step, 54, opts(s+1, null, null, {strokeWidth:3}));
  rc.line(34, 40, 36 + step, 54, opts(s+2, null, null, {strokeWidth:3}));
  rc.line(50, 40, 48 - step, 54, opts(s+3, null, null, {strokeWidth:3}));
  rc.line(60, 40, 62 + step, 54, opts(s+4, null, null, {strokeWidth:3}));
  rc.ellipse(42, 33, 48, 24, opts(s, col, 'hachure', {hachureGap:3, fillWeight:2.2, strokeWidth:2}));
  rc.curve([[64,28],[72,20],[70,10]], opts(s+5, null, null, {strokeWidth:3.4}));   // tail
  rc.ellipse(17, 25, 22, 20, opts(s+6, col, 'hachure', {hachureGap:3, fillWeight:2.2, strokeWidth:2}));
  rc.polygon([[8,25],[1,29],[9,32]], opts(s+7, col, 'solid', {roughness:1.4}));    // snout
  rc.polygon([[21,15],[25,5],[30,17]], opts(s+8, col, 'solid', {roughness:1.4}));  // floppy ear
  rc.circle(15, 23, 2.2, opts(s+9, INK, 'solid', {roughness:.6}));                 // eye
  rc.circle(2, 29, 1.6, opts(s+10, INK, 'solid', {roughness:.6}));                 // nose
}

// generic townsfolk — deliberately different from the two mains: rounder
// head, boxy coat, sometimes a hat, and a varied clothing/hair palette
function drawPed(rc, g, s, pose, pal){
  if (pose === 'walk0'){
    rc.line(27, 100, 21, 120, opts(s+1, null, null, {strokeWidth:3.4}));
    rc.line(37, 100, 43, 120, opts(s+2, null, null, {strokeWidth:3.4}));
  } else {
    rc.line(29, 100, 28, 120, opts(s+1, null, null, {strokeWidth:3.4}));
    rc.line(35, 100, 37, 120, opts(s+2, null, null, {strokeWidth:3.4}));
  }
  // boxy coat, shorter than the mains
  rc.polygon([[23,58],[41,58],[46,102],[18,102]],
    opts(s+3, pal.coat, 'hachure', {hachureGap:5, fillWeight:2, strokeWidth:2.2}));
  // arms
  if (pose === 'walk0'){
    rc.line(24, 62, 15, 90, opts(s+4, null, null, {strokeWidth:3.2}));
    rc.line(40, 62, 49, 88, opts(s+5, null, null, {strokeWidth:3.2}));
  } else {
    rc.line(24, 62, 19, 92, opts(s+4, null, null, {strokeWidth:3.2}));
    rc.line(40, 62, 45, 90, opts(s+5, null, null, {strokeWidth:3.2}));
  }
  // short neck + round head (not the mains' elongated oval)
  rc.line(32, 58, 32, 50, opts(s+6, null, null, {strokeWidth:4}));
  rc.circle(32, 38, 22, opts(s+7, PAL.skin, 'solid', {roughness:1.4, bowing:1.6}));
  // rounded hair cap over the crown
  rc.arc(32, 34, 28, 26, Math.PI * 0.98, Math.PI * 2.02, true,
    opts(s+8, pal.hair, 'hachure', {hachureGap:2.6, fillWeight:2.2}));
  if (pal.hat){
    rc.polygon([[23,28],[41,28],[37,14],[27,14]], opts(s+9, pal.hat, 'hachure', {hachureGap:3, fillWeight:2}));
    rc.ellipse(32, 28, 36, 8, opts(s+10, pal.hat, 'solid', {roughness:1.4}));   // brim
  }
  // face
  rc.line(27, 38, 30, 38, opts(s+11, null, null, {strokeWidth:1.6, roughness:1}));
  rc.line(35, 38, 38, 38, opts(s+12, null, null, {strokeWidth:1.6, roughness:1}));
  rc.line(30, 45, 34, 45, opts(s+13, null, null, {strokeWidth:1.4, roughness:1}));
}

function drawTree(rc, g, s, kind){
  if (kind === 1){
    // tall slim poplar
    rc.line(26, 112, 26, 52, opts(s, null, null, {stroke:PAL.hairM, strokeWidth:5, bowing:3}));
    rc.ellipse(26, 62, 30, 46, opts(s+1, PAL.darkgreen, 'cross-hatch', {hachureGap:5, fillWeight:1.8, bowing:3}));
    rc.ellipse(26, 32, 24, 42, opts(s+2, PAL.green, 'hachure', {hachureGap:4, fillWeight:1.8}));
    rc.ellipse(26, 12, 16, 20, opts(s+3, PAL.green, 'hachure', {hachureGap:3.4, fillWeight:1.8}));
  } else if (kind === 2){
    // short bushy one with berries
    rc.line(32, 80, 32, 58, opts(s, null, null, {stroke:PAL.hairM, strokeWidth:7, bowing:3}));
    rc.circle(16, 52, 28, opts(s+2, PAL.darkgreen, 'hachure', {hachureGap:4, fillWeight:1.8}));
    rc.circle(48, 50, 30, opts(s+3, PAL.darkgreen, 'hachure', {hachureGap:4, fillWeight:1.8}));
    rc.circle(32, 42, 46, opts(s+1, PAL.green, 'cross-hatch', {hachureGap:5, fillWeight:1.8, bowing:3}));
    rc.circle(22, 38, 3, opts(s+4, PAL.pink, 'solid', {stroke:PAL.pink, roughness:.6}));
    rc.circle(40, 48, 3, opts(s+5, PAL.pink, 'solid', {stroke:PAL.pink, roughness:.6}));
    rc.circle(34, 28, 3, opts(s+6, PAL.pink, 'solid', {stroke:PAL.pink, roughness:.6}));
  } else {
    // classic round one
    rc.line(30, 96, 30, 62, opts(s, null, null, {stroke:PAL.hairM, strokeWidth:6, bowing:3}));
    rc.circle(30, 40, 52, opts(s+1, PAL.darkgreen, 'cross-hatch', {hachureGap:5, fillWeight:1.8, bowing:3}));
    rc.circle(14, 52, 26, opts(s+2, PAL.green, 'hachure', {hachureGap:4, fillWeight:1.8}));
    rc.circle(46, 50, 28, opts(s+3, PAL.green, 'hachure', {hachureGap:4, fillWeight:1.8}));
  }
}

// a big leaping cat for the intro background; legs splayed differently per variant
function drawJumpCat(rc, g, s, legs){
  const co = opts(s, PAL.cat, 'hachure', {hachureGap:2.6, fillWeight:2.6, strokeWidth:2.4});
  legs.forEach((L, i) => rc.line(L[0], L[1], L[2], L[3], opts(s+1+i, null, null, {stroke:PAL.cat, strokeWidth:4})));
  rc.ellipse(50, 34, 60, 24, co);                                   // stretched body
  rc.curve([[22,32],[8,24],[2,9]], opts(s+9, null, null, {stroke:PAL.cat, strokeWidth:5}));   // streaming tail
  rc.ellipse(80, 28, 22, 18, opts(s+6, PAL.cat, 'hachure', {hachureGap:2.6, fillWeight:2.6}));// head (front)
  rc.polygon([[72,20],[74,10],[80,19]], opts(s+7, PAL.cat, 'solid'));   // ears back
  rc.polygon([[82,19],[88,10],[89,21]], opts(s+8, PAL.cat, 'solid'));
  rc.circle(77, 26, 3, opts(s+10, '#9fce6a', 'solid', {stroke:'#9fce6a', roughness:.6}));     // eyes
  rc.circle(85, 26, 3, opts(s+11, '#9fce6a', 'solid', {stroke:'#9fce6a', roughness:.6}));
}

const ALLWINS = [];   // centers of every building window, for window-dwellers
function drawWorld(rc, g, s){
  g.fillStyle = PAPER; g.fillRect(0, 0, WORLD_W, WORLD_H);

  // faint pencil speckle so the bare paper ground isn't dead flat
  for (let gy = 40; gy < WORLD_H; gy += 110){
    for (let gx = 30; gx < WORLD_W; gx += 130){
      const j = (gx * 7 + gy * 13) % 97;           // deterministic jitter
      const x = gx + (j % 41), y = gy + (j % 29);
      rc.line(x, y, x + 8 + (j % 7), y + 2 - (j % 5),
        opts(9100 + gx * 3 + gy, null, null, {stroke:'#ddcfae', strokeWidth:1.5, roughness:1.8}));
    }
  }

  // green ground — separate, non-overlapping zones (one per building cluster)
  // plus the park. Clipped once to (world − roads − buildings) so the grass
  // stays off the roads and cuts a clean hole around each building.
  g.save();
  g.beginPath();
  g.rect(0, 0, WORLD_W, WORLD_H);
  g.rect(-2, HROAD.y, WORLD_W + 4, HROAD.h);
  g.rect(VROAD.x, -2, VROAD.w, WORLD_H + 4);
  BUILDINGS.forEach(b => g.rect(b.x, b.y, b.w, b.h));
  g.clip('evenodd');
  GREENZONES.forEach((z, i) => rc.rectangle(z[0], z[1], z[2], z[3],
    opts(9200+i, PAL.green, 'zigzag', {hachureGap:9, fillWeight:3, strokeWidth:1.9, roughness:2.6, bowing:2.4})));
  rc.polygon(PARK, opts(s+5, PAL.green, 'zigzag', {hachureGap:9, fillWeight:3, strokeWidth:2, roughness:2.8, bowing:3}));
  g.restore();

  // park path (pink) across the park green
  rc.curve([[320,600],[520,520],[700,480],[860,540]],
    opts(s+6, null, null, {stroke:PAL.pink, strokeWidth:10, roughness:2.6}));

  // roads — fixed seeds (not derived from s) so they stay identical in both
  // boil variants; a large flickering hachure field was too distracting
  rc.rectangle(0, HROAD.y, WORLD_W, HROAD.h,
    opts(9007, PAL.road, 'hachure', {hachureGap:11, fillWeight:2.2, strokeWidth:2.2, roughness:2.9, bowing:1.6}));
  rc.rectangle(VROAD.x, 0, VROAD.w, WORLD_H,
    opts(9008, PAL.road, 'hachure', {hachureGap:11, fillWeight:2.2, strokeWidth:2.2, roughness:2.9, bowing:1.6}));
  // dashed centre lines
  for (let x = 30; x < WORLD_W - 40; x += 90){
    if (x > VROAD.x - 40 && x < VROAD.x + VROAD.w) continue;
    rc.line(x, HROAD.y + 60, x + 42, HROAD.y + 60,
      opts(9009+x, null, null, {stroke:'#f7f2e2', strokeWidth:4, roughness:2.9}));
  }
  for (let y = 30; y < WORLD_H - 40; y += 90){
    if (y > HROAD.y - 40 && y < HROAD.y + HROAD.h) continue;
    rc.line(VROAD.x + 55, y, VROAD.x + 55, y + 42,
      opts(9011+y, null, null, {stroke:'#f7f2e2', strokeWidth:4, roughness:2.9}));
  }
  // tram rails along the lower lane + stop sign at the terminus
  rc.line(0, 744, WORLD_W, 744, opts(9030, null, null, {stroke:'#8f97a6', strokeWidth:2, roughness:2.4, bowing:1.4}));
  rc.line(0, 776, WORLD_W, 776, opts(9031, null, null, {stroke:'#8f97a6', strokeWidth:2, roughness:2.4, bowing:1.4}));
  rc.line(1846, 700, 1846, 664, opts(9032, null, null, {strokeWidth:3}));
  rc.rectangle(1838, 650, 16, 14, opts(9033, PAL.winLit, 'solid', {strokeWidth:1.6, roughness:1.4}));

  // crosswalks (zebra)
  for (let i = 0; i < 6; i++){
    rc.rectangle(1090 + i*2, HROAD.y + 8 + i*18, 60, 12,
      opts(9013+i, '#f7f2e2', 'solid', {strokeWidth:1.4, roughness:2.6, bowing:2}));
    rc.rectangle(VROAD.x + 6 + i*17, 560 + (i%2)*3, 12, 56,
      opts(9020+i, '#f7f2e2', 'solid', {strokeWidth:1.4, roughness:2.6, bowing:2}));
  }

  // buildings — paneláky with misaligned windows
  BUILDINGS.forEach((b, bi) => {
    rc.rectangle(b.x, b.y, b.w, b.h,
      opts(s+30+bi, b.c, 'hachure', {hachureGap:6, fillWeight:2.2, strokeWidth:2.6, bowing:3}));
    const cols = Math.floor(b.w / 46), rows = b.fl;
    for (let r = 0; r < rows; r++){
      for (let c = 0; c < cols; c++){
        const jx = ((bi*7 + r*3 + c*5) % 7) - 3;   // deterministic jitter
        const jy = ((bi*5 + r*7 + c*3) % 5) - 2;
        const wx = b.x + 18 + c * (b.w - 30) / cols + jx;
        const wy = b.y + 14 + r * (b.h - 24) / rows + jy;
        const lit = (bi*13 + r*5 + c*7) % 9 === 0;
        if (worldLayers.length === 0){
          ALLWINS.push([wx + 10, wy + 12]);
          if (lit) LITWINS.push([wx + 10, wy + 12]);
        }
        rc.rectangle(wx, wy, 20, 24,
          opts(s+40 + bi*100 + r*10 + c, lit ? PAL.winLit : PAL.win, 'solid',
            {strokeWidth:1.6, roughness:1.7}));
      }
    }
    // door
    rc.rectangle(b.x + b.w/2 - 12, b.y + b.h - 30, 24, 30,
      opts(s+38+bi, PAL.hairM, 'hachure', {hachureGap:3, strokeWidth:2}));
  });

  // cars — wobbly Škodas
  CARS.forEach((c, i) => {
    rc.polygon([[c.x, c.y+c.h-10],[c.x+8, c.y+8],[c.x+26, c.y],[c.x+c.w-24, c.y],
                [c.x+c.w-6, c.y+10],[c.x+c.w, c.y+c.h-10],[c.x, c.y+c.h-10]],
      opts(s+70+i, c.c, 'hachure', {hachureGap:4, fillWeight:2, strokeWidth:2.2}));
    rc.rectangle(c.x+24, c.y+6, c.w-52, 14,
      opts(s+75+i, PAL.win, 'solid', {strokeWidth:1.6, roughness:1.6}));
    rc.circle(c.x+22, c.y+c.h-6, 16, opts(s+80+i, INK, 'solid', {roughness:1.4}));
    rc.circle(c.x+c.w-22, c.y+c.h-6, 16, opts(s+85+i, INK, 'solid', {roughness:1.4}));
  });

  // popelnice
  BINS.forEach((b, i) => {
    rc.rectangle(b.x, b.y, 44, 30,
      opts(s+90+i, '#7d8a6a', 'hachure', {hachureGap:3.4, strokeWidth:2}));
    rc.line(b.x-4, b.y, b.x+48, b.y-2, opts(s+95+i, null, null, {strokeWidth:3}));
  });

  // benches
  BENCHES.forEach((p, i) => {
    rc.rectangle(p[0], p[1], 60, 10, opts(s+100+i, PAL.hairM, 'hachure', {hachureGap:3, strokeWidth:2}));
    rc.line(p[0]+6, p[1]+10, p[0]+6, p[1]+22, opts(s+105+i, null, null, {strokeWidth:2.6}));
    rc.line(p[0]+54, p[1]+10, p[0]+54, p[1]+22, opts(s+106+i, null, null, {strokeWidth:2.6}));
  });

  // street lamps (lit dynamically at night in drawNight)
  LAMPS.forEach((L, i) => {
    rc.line(L[0], L[1], L[0], L[1] - 46, opts(s+120+i, null, null, {strokeWidth:3}));
    rc.circle(L[0], L[1] - 48, 11, opts(s+140+i, PAL.win, 'solid', {strokeWidth:1.8, roughness:1.2}));
  });

  // prádelní šňůry — sagging lines with laundry pegged out to dry
  CLOTHESLINES.forEach((cl, ci) => {
    const [ax, ay] = cl.a, [bx, by] = cl.b;
    if (!cl.wall){
      [[ax, ay], [bx, by]].forEach((p, pi) => {           // courtyard T-posts
        rc.line(p[0], p[1] + 46, p[0], p[1], opts(s+160+ci*10+pi, null, null, {strokeWidth:3}));
        rc.line(p[0] - 7, p[1], p[0] + 7, p[1], opts(s+165+ci*10+pi, null, null, {strokeWidth:2.6}));
      });
    }
    const sag = 9;
    rc.curve([[ax, ay], [(ax+bx)/2, (ay+by)/2 + sag], [bx, by]],
      opts(s+170+ci, null, null, {stroke:'#8a8f9a', strokeWidth:1.6, roughness:1.6}));
    // laundry pieces, deterministically varied per line
    const n = (bx - ax) > 110 ? 4 : 3;
    for (let k = 0; k < n; k++){
      const t = (k + 1) / (n + 1) + (((ci * 13 + k * 7) % 5) - 2) * 0.015;
      const px2 = ax + (bx - ax) * t;
      const py2 = ay + (by - ay) * t + sag * Math.sin(Math.PI * t);
      const col = LAUNDRY_COLS[(ci * 2 + k) % LAUNDRY_COLS.length];
      const ps = s + 180 + ci * 20 + k * 5;
      rc.line(px2 - 1, py2 - 2, px2 + 1, py2 + 3, opts(ps, null, null, {strokeWidth:1.4, roughness:.8}));  // peg
      const kind = (ci + k) % 3;
      if (kind === 0){                                    // a little shirt
        rc.polygon([[px2-6, py2+3],[px2+6, py2+3],[px2+7, py2+20],[px2-7, py2+20]],
          opts(ps+1, col, 'hachure', {hachureGap:2.6, fillWeight:1.8, strokeWidth:1.6}));
        rc.line(px2 - 6, py2 + 6, px2 - 11, py2 + 13, opts(ps+2, null, null, {stroke:col, strokeWidth:3}));
        rc.line(px2 + 6, py2 + 6, px2 + 11, py2 + 13, opts(ps+3, null, null, {stroke:col, strokeWidth:3}));
      } else if (kind === 1){                             // a sheet
        rc.rectangle(px2 - 9, py2 + 2, 18, 21, opts(ps+1, '#efe8d2', 'solid', {strokeWidth:1.6, roughness:1.7}));
      } else {                                            // a pair of socks
        rc.line(px2 - 4, py2 + 2, px2 - 4, py2 + 12, opts(ps+1, null, null, {stroke:col, strokeWidth:4, roughness:1.2}));
        rc.line(px2 - 4, py2 + 12, px2 - 8, py2 + 15, opts(ps+2, null, null, {stroke:col, strokeWidth:4, roughness:1.2}));
        rc.line(px2 + 4, py2 + 2, px2 + 4, py2 + 12, opts(ps+3, null, null, {stroke:col, strokeWidth:4, roughness:1.2}));
        rc.line(px2 + 4, py2 + 12, px2 + 8, py2 + 15, opts(ps+4, null, null, {stroke:col, strokeWidth:4, roughness:1.2}));
      }
    }
  });
}

const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
const dist  = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);

function inPoly(px, py, poly){
  let inside = false;
  for (let i = 0, j = poly.length - 1; i < poly.length; j = i++){
    const [xi, yi] = poly[i], [xj, yj] = poly[j];
    if ((yi > py) !== (yj > py) && px < (xj - xi) * (py - yi) / (yj - yi) + xi)
      inside = !inside;
  }
  return inside;
}
function isGreen(x, y){
  if (inPoly(x, y, PARK)) return true;
  for (const z of GREENZONES){
    if (x > z[0] && x < z[0] + z[2] && y > z[1] && y < z[1] + z[3]) return true;
  }
  return false;
}
function randomParkPoint(){
  for (let k = 0; k < 30; k++){
    const x = 210 + Math.random() * 760, y = 360 + Math.random() * 330;
    if (inPoly(x, y, PARK)) return { x, y };
  }
  return { x: 520, y: 520 };
}
function isOnRoad(x, y){
  return (y > HROAD.y && y < HROAD.y + HROAD.h) || (x > VROAD.x && x < VROAD.x + VROAD.w);
}
function benchNear(p){
  for (const b of BENCHES){
    if (Math.hypot(p.x - (b[0] + 30), p.y - (b[1] + 8)) < 44) return b;
  }
  return null;
}

function pickPigeonLanding(pg){
  // somewhere a good stretch away, clear of the buildings/cars so the cat
  // isn't dropped inside a collider
  for (let k = 0; k < 24; k++){
    const a = Math.random() * 6.28, d = 320 + Math.random() * 240;
    const x = clamp(pg.x + Math.cos(a) * d, 60, WORLD_W - 60);
    const y = clamp(pg.y + Math.sin(a) * d, 60, WORLD_H - 60);

let AC = null, masterGain = null, audioOn = false, muted = false;
const SFX = {};            // name -> decoded AudioBuffer
const loops = {};          // looping beds: name -> {gain, src}
const LOOP_NAMES = ['rain', 'birds', 'crickets'];
const SFX_FILES = {
  meow:'sounds/meow.mp3', meow2:'sounds/meow2.mp3', meow3:'sounds/meow3.mp3',
  hiss:'sounds/hiss.mp3', hiss2:'sounds/hiss2.mp3', purr:'sounds/purr.mp3',
  mumble:'sounds/mumble.mp3', mumble2:'sounds/mumble2.mp3', mumble3:'sounds/mumble3.mp3',
  bark:'sounds/bark.mp3', thunder:'sounds/thunder.mp3', rain:'sounds/rain.mp3',
  carloop:'sounds/carloop.mp3', tram:'sounds/tram.mp3', shout:'sounds/shout.mp3',
  thump:'sounds/thump.mp3', step:'sounds/step.mp3', munch:'sounds/munch.mp3',
  birds:'sounds/birds.mp3', crickets:'sounds/crickets.mp3',
  fly:'sounds/fly.mp3', mosquito:'sounds/mosquito.mp3', moth:'sounds/moth.mp3'

function initAudio(){
  if (AC){ if (AC.state === 'suspended') AC.resume(); return; }
  try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){ return; }
  masterGain = AC.createGain(); masterGain.gain.value = muted ? 0 : 0.7; masterGain.connect(AC.destination);
  audioOn = true;
  for (const n of LOOP_NAMES){ const gn = AC.createGain(); gn.gain.value = 0; gn.connect(masterGain); loops[n] = { node: gn, src: null }; }
  for (const name in SFX_FILES){
    fetch(SFX_FILES[name]).then(r => r.arrayBuffer()).then(a => AC.decodeAudioData(a)).then(buf => {
      SFX[name] = buf;
      if (loops[name] && !loops[name].src){       // start the looping bed once decoded
        const src = AC.createBufferSource(); src.buffer = buf; src.loop = true;
        src.connect(loops[name].node); src.start(); loops[name].src = src;
      }
    }).catch(() => {});
  }
}
function updateAudio(){
  if (!audioOn) return;
  const t = AC.currentTime;
  masterGain.gain.setTargetAtTime(muted ? 0 : 0.7, t, 0.08);
  const dayT = dayPhase(), wet = weatherLevel >= 2 ? 0.4 : 1;
  if (loops.rain)     loops.rain.node.gain.setTargetAtTime(([0,0.2,0.5,0.8][weatherLevel] || 0), t, 0.8);
  if (loops.birds)    loops.birds.node.gain.setTargetAtTime(clamp(1 - dayT * 2.2, 0, 1) * 0.17 * wet, t, 1.2);
  if (loops.crickets) loops.crickets.node.gain.setTargetAtTime(clamp((dayT - 0.35) / 0.4, 0, 1) * 0.22 * wet, t, 1.2);
  updateCarAudio();
  updateBugAudio();
}
// one-shots: short fade in/out envelope + optional pitch variation
function playClip(name, vol, pitch){
  if (!audioOn || muted || !SFX[name]) return;
  const t = AC.currentTime, buf = SFX[name];
  const src = AC.createBufferSource(); src.buffer = buf;
  if (pitch) src.playbackRate.value = pitch;
  const dur = buf.duration / (src.playbackRate.value || 1);
  const v = vol == null ? 1 : vol, atk = Math.min(0.04, dur * 0.25), rel = Math.min(0.12, dur * 0.35);
  const g = AC.createGain();
  g.gain.setValueAtTime(0.0001, t);
  g.gain.linearRampToValueAtTime(v, t + atk);
  g.gain.setValueAtTime(v, t + Math.max(atk, dur - rel));
  g.gain.linearRampToValueAtTime(0.0001, t + dur);
  src.connect(g); g.connect(masterGain); src.start(); src.stop(t + dur + 0.03);
}

// per-bug looping hum, synthesized (no sample needed): a raspy wobbling
// sawtooth for the fly, a thin whine for the mosquito, pulsed soft noise for
// the moth's flutter — running for as long as the bug is around
function bugAudioStart(b){
  if (!audioOn) return;
  const g = AC.createGain(); g.gain.value = 0;
  const pan = AC.createStereoPanner ? AC.createStereoPanner() : null;
  const dest = pan || g;
  if (pan){ pan.connect(g); }
  g.connect(masterGain);
  // preferred: the vendored ElevenLabs loop for this insect (fly/mosquito/moth);
  // each bug gets its own slightly detuned copy so two flies don't phase-lock
  if (SFX[b.type]){
    const src = AC.createBufferSource(); src.buffer = SFX[b.type]; src.loop = true;
    const rate0 = 1 + (Math.random() - 0.5) * 0.14;
    src.playbackRate.value = rate0;
    src.connect(dest);
    src.start(0, Math.random() * Math.max(0, SFX[b.type].duration - 0.1));  // random loop phase
    b.audio = { g, pan, nodes: [src], oscs: [], src, rate0 };
    return;
  }
  // fallback (clip missing / not decoded yet): synthesized hum
  const nodes = [], oscs = [];
  if (b.type === 'moth'){
    // velvet wing flutter: soft low noise, pulsed at wing-beat rate, with a
    // second slow LFO wandering the pulse depth so it doesn't tick like a clock
    const nb = AC.createBuffer(1, AC.sampleRate, AC.sampleRate);
    const dd = nb.getChannelData(0);
    for (let i = 0; i < dd.length; i++) dd[i] = Math.random() * 2 - 1;
    const src = AC.createBufferSource(); src.buffer = nb; src.loop = true;
    const lp = AC.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 320; lp.Q.value = 0.7;
    const fl = AC.createGain(); fl.gain.value = 0.5;
    const lfo = AC.createOscillator(); lfo.frequency.value = 7.4;
    const lg = AC.createGain(); lg.gain.value = 0.3;
    const lfo2 = AC.createOscillator(); lfo2.frequency.value = 0.53;
    const lg2 = AC.createGain(); lg2.gain.value = 0.12;
    lfo.connect(lg); lg.connect(fl.gain);
    lfo2.connect(lg2); lg2.connect(fl.gain);
    src.connect(lp); lp.connect(fl); fl.connect(dest);
    src.start(); lfo.start(); lfo2.start(); nodes.push(src, lfo, lfo2);
  } else {
    // two slightly detuned oscillators beating against each other through a
    // gentle lowpass — much closer to a real insect drone than a bare tone
    const base = b.type === 'fly' ? 160 : 470;
    const lp = AC.createBiquadFilter(); lp.type = 'lowpass';
    lp.frequency.value = b.type === 'fly' ? 850 : 2100; lp.Q.value = 1.4;
    lp.connect(dest);
    [[1, 0.6], [b.type === 'fly' ? 1.014 : 1.019, 0.45]].forEach(([det, vol]) => {
      const osc = AC.createOscillator();
      osc.type = b.type === 'fly' ? 'sawtooth' : 'triangle';
      osc.frequency.value = base * det;
      const og = AC.createGain(); og.gain.value = vol;
      osc.connect(og); og.connect(lp);
      osc.start(); nodes.push(osc); oscs.push({ osc, base: base * det });
    });
    // shared wing-beat shimmer on both partials
    const lfo = AC.createOscillator(); lfo.frequency.value = b.type === 'fly' ? 6.8 : 9.5;
    const lg = AC.createGain(); lg.gain.value = b.type === 'fly' ? 6 : 11;
    lfo.connect(lg); oscs.forEach(o => lg.connect(o.osc.frequency));
    lfo.start(); nodes.push(lfo);
  }
  b.audio = { g, pan, nodes, oscs };
}
function updateBugAudio(){
  for (const b of bugs){
    if (!b.audio && audioOn) bugAudioStart(b);
    if (b.audio){
      const t = AC.currentTime;
      const d = Math.hypot(b.x - player.x, b.y - player.y);
      const base = b.type === 'fly' ? 0.07 : b.type === 'mosquito' ? 0.045 : 0.06;
      b.audio.g.gain.setTargetAtTime(clamp(1 - d / 460, 0, 1) * base * b.fade, t, 0.15);
      if (b.audio.pan) b.audio.pan.pan.setTargetAtTime(clamp((b.x - player.x) / 420, -1, 1), t, 0.15);

      const swoop = 1 + 0.05 * Math.sin(b.t * 0.8 + b.dir) + 0.03 * Math.sin(b.t * 2.3);

      else for (const o of b.audio.oscs) o.osc.frequency.setTargetAtTime(o.base * swoop, t, 0.1);
    }
  }
}

function inputVec(){
